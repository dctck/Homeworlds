const KEYWORDS_LOG = ['set','build','trade','discover','move','hijack','sacrifice','catastrophe','skip','HW','ship','homeworld','attack','draw','forfeit'];
function highlightLog(str) {
  return str.split(' ').map(t => {
    if (KEYWORDS_LOG.includes(t))  return `<span class="ml-kw">${t}</span>`;
    if (/^r\d/.test(t))            return `<span class="piece-r">${t}</span>`;
    if (/^b\d/.test(t))            return `<span class="piece-b">${t}</span>`;
    if (/^y\d/.test(t))            return `<span class="piece-y">${t}</span>`;
    if (/^g\d/.test(t))            return `<span class="piece-g">${t}</span>`;
    if (t==='r') return `<span class="piece-r">${t}</span>`;
    if (t==='b') return `<span class="piece-b">${t}</span>`;
    if (t==='y') return `<span class="piece-y">${t}</span>`;
    if (t==='g') return `<span class="piece-g">${t}</span>`;
    return t;
  }).join(' ');
}

// ── State ────────────────────────────────────────────────────

// ════════════════════════════════════════════════════════════
//  DETERMINISTIC REPLAY ENGINE
//
//  Rebuilds board snapshots from a flat moves array
//  (the same notation strings logged during play).
//  This eliminates the need to store snapshots in Firebase,
//  reducing archive size from ~100KB to ~2KB per game.
// ════════════════════════════════════════════════════════════

const LETTER_COLOR_MAP = { r:'red', b:'blue', y:'yellow', g:'green' };
//const COLOR_LETTER_MAP2 = { red:'r', blue:'b', yellow:'y', green:'g' };

// ── Make a fresh initial state ───────────────────────────────
function makeInitialState() {
  const bank = {};
  COLORS.forEach(c => { bank[c] = {1:3, 2:3, 3:3}; });
  return {
    phase: 'SETUP',
    currentPlayer: 1,
    setupStep: 0, setupDone: false, setupCache: { stars: [] },
    bank, systems: [],
    interaction: 'IDLE', selectedShipId: null, movingFromSysId: null,
    sacrificePool: { color: null, count: 0 },
    turnUsed: false,
    history: null,
    log: [], _pendingActions: [], currentTurn: 1,
  };
}

// ── Piece notation parser ────────────────────────────────────
function parsePiece(tok) {
  if (!tok) return null;
  return { color: LETTER_COLOR_MAP[tok[0]], size: parseInt(tok[1]) };
}

// Parse a notation string → action descriptor
function parseNotation(str) {
  if (!str) return null;
  const t = str.trim().split(/\s+/);
  const cmd = t[0];

  // Handle all notation variants the game engine actually produces:
  //   "set HW b1 y2 ship y3 Nexus"  — homeworld setup
  //   "hijack r2 SYS"               — attack/capture (game calls it hijack)
  //   "skip"                        — pass/skip turn
  //   "homeworld r1 b2 g3 HOME1"    — legacy format
  //   "attack r2 SYS"               — legacy format
  //   "pass"                        — legacy format
  //   "catastrophe failed"          — ignore (log artifact only)

  if (cmd === 'set' && t[1] === 'HW') {
    // "set HW b1 y2 ship y3 Nexus"
    //   t[0]=set t[1]=HW t[2]=star1 t[3]=star2 t[4]=ship t[5]=shipPiece t[6]=sysName
    return { type:'homeworld', star1: parsePiece(t[2]), star2: parsePiece(t[3]),
             ship: parsePiece(t[5]), sysName: t[6] };
  }

  switch(cmd) {
    case 'homeworld':
      // legacy: "homeworld r1 b2 g3 HOME1"
      return { type:'homeworld', star1: parsePiece(t[1]), star2: parsePiece(t[2]),
               ship: parsePiece(t[3]), sysName: t[4] };

    case 'build':
      return { type:'build', ship: parsePiece(t[1]), sysName: t[2] };

    case 'trade':
      return { type:'trade', ship: parsePiece(t[1]), sysName: t[2],
               newColor: LETTER_COLOR_MAP[t[3]] };

    case 'discover':
      return { type:'discover', ship: parsePiece(t[1]), fromName: t[2],
               star: parsePiece(t[3]), newName: t[4] };

    case 'move':
      return { type:'move', ship: parsePiece(t[1]), fromName: t[2], toName: t[3] };

    case 'hijack':   // game's term for attack/capture
    case 'attack':
      return { type:'attack', ship: parsePiece(t[1]), sysName: t[2] };

    case 'sacrifice':
      return { type:'sacrifice', ship: parsePiece(t[1]), sysName: t[2] };

    case 'catastrophe':
      // "catastrophe failed" is just a log note — skip it
      if (t[1] === 'failed') return { type:'skip' };
      return { type:'catastrophe', sysName: t[1], color: LETTER_COLOR_MAP[t[2]] };

    case 'skip':     // game's term for pass
    case 'pass':
      return { type:'skip' };

    // Non-game-state notations — visible in log but don't change board
    case 'draw':
      // "draw ?"  → offer sent
      // "draw Yes"→ accepted
      // "draw No" → declined
      return { type: 'annotation', text: str };
    case 'forfeit':
      // "forfeit"
      return { type: 'annotation', text: str };

    default:
      console.warn('[Replay] Unknown notation:', str);
      return null;
  }
}

// ── State helpers ────────────────────────────────────────────
let _replayUid = 0;
function nextReplayId() { return ++_replayUid; }

function findSysByName(st, name) {
  return st.systems.find(s => s.name === name) || null;
}
function findShipInSys(sys, color, size, owner) {
  return sys.ships.find(s => s.color === color && s.size === size &&
    (owner === undefined || s.owner === owner)) || null;
}
function findEnemyShipInSys(sys, color, size, ownerNot) {
  return sys.ships.find(s => s.color === color && s.size === size && s.owner !== ownerNot) || null;
}
function cleanSystemsR(st) {
  st.systems = st.systems.filter(sys => {
    if (sys.isHomeworld) return true;
    if (sys.ships.length === 0) {
      sys.stars.forEach(s => st.bank[s.color][s.size]++);
      return false;
    }
    return true;
  });
}
function systemSizesR(sys) {
  return new Set(sys.stars.map(s => s.size));
}

// ── Apply a single parsed action to state ───────────────────
function applyParsed(st, action, player) {
  // Operate on a shallow-enough clone
  const s = JSON.parse(JSON.stringify(st));

  switch(action.type) {

    case 'homeworld': {
      const { star1, star2, ship, sysName } = action;
      s.bank[star1.color][star1.size]--;
      s.bank[star2.color][star2.size]--;
      s.bank[ship.color][ship.size]--;
      const newShip = { id: nextReplayId(), color: ship.color, size: ship.size, owner: player };
      s.systems.push({
        id: nextReplayId(), name: sysName, isHomeworld: player,
        stars: [{ color: star1.color, size: star1.size },
                { color: star2.color, size: star2.size }],
        ships: [newShip],
      });
      break;
    }

    case 'build': {
      const { ship, sysName } = action;
      const sys = findSysByName(s, sysName); if (!sys) break;
      const sz  = [1,2,3].find(n => s.bank[ship.color][n] > 0);
      if (!sz) break;
      s.bank[ship.color][sz]--;
      sys.ships.push({ id: nextReplayId(), color: ship.color, size: sz, owner: player });
      break;
    }

    case 'trade': {
      const { ship: sp, sysName, newColor } = action;
      const sys = findSysByName(s, sysName); if (!sys) break;
      const found = findShipInSys(sys, sp.color, sp.size, player);
      if (!found) break;
      s.bank[found.color][found.size]++;
      s.bank[newColor][found.size]--;
      found.color = newColor;
      break;
    }

    case 'discover': {
      const { ship: sp, fromName, star, newName } = action;
      const fromSys = findSysByName(s, fromName); if (!fromSys) break;
      const shipObj = findShipInSys(fromSys, sp.color, sp.size, player);
      if (!shipObj) break;
      s.bank[star.color][star.size]--;
      const newSys = {
        id: nextReplayId(), name: newName, isHomeworld: null,
        stars: [{ color: star.color, size: star.size }],
        ships: [],
      };
      fromSys.ships = fromSys.ships.filter(sh => sh.id !== shipObj.id);
      newSys.ships.push(shipObj);
      s.systems.push(newSys);
      cleanSystemsR(s);
      break;
    }

    case 'move': {
      const { ship: sp, fromName, toName } = action;
      const fromSys = findSysByName(s, fromName); if (!fromSys) break;
      const toSys   = findSysByName(s, toName);   if (!toSys) break;
      const shipObj = findShipInSys(fromSys, sp.color, sp.size, player);
      if (!shipObj) break;
      fromSys.ships = fromSys.ships.filter(sh => sh.id !== shipObj.id);
      toSys.ships.push(shipObj);
      cleanSystemsR(s);
      break;
    }

    case 'attack': {
      const { ship: sp, sysName } = action;
      const sys = findSysByName(s, sysName); if (!sys) break;
      const target = findEnemyShipInSys(sys, sp.color, sp.size, player);
      if (!target) break;
      target.owner = player;
      break;
    }

    case 'sacrifice': {
      const { ship: sp, sysName } = action;
      const sys = findSysByName(s, sysName); if (!sys) break;
      const shipObj = findShipInSys(sys, sp.color, sp.size, player);
      if (!shipObj) break;
      s.bank[shipObj.color][shipObj.size]++;
      sys.ships = sys.ships.filter(sh => sh.id !== shipObj.id);
      cleanSystemsR(s);
      break;
    }

    case 'catastrophe': {
      const { sysName, color } = action;
      const sys = findSysByName(s, sysName); if (!sys) break;
      sys.stars.filter(st => st.color === color).forEach(st => s.bank[st.color][st.size]++);
      sys.ships.filter(sh => sh.color === color).forEach(sh => s.bank[sh.color][sh.size]++);
      sys.stars = sys.stars.filter(st => st.color !== color);
      sys.ships = sys.ships.filter(sh => sh.color !== color);
      if (!sys.isHomeworld) {
        if (sys.ships.length === 0) {
          sys.stars.forEach(st => s.bank[st.color][st.size]++);
          sys.stars = [];
          s.systems = s.systems.filter(sx => sx.id !== sys.id);
        } else if (sys.stars.length === 0) {
          sys.ships.forEach(sh => s.bank[sh.color][sh.size]++);
          sys.ships = [];
          s.systems = s.systems.filter(sx => sx.id !== sys.id);
        }
      } else if (sys.stars.length === 0) {
        sys.ships.forEach(sh => s.bank[sh.color][sh.size]++);
        sys.ships = [];
      }
      break;
    }

    case 'pass':
    case 'skip':
      break; // no state change

    default: break;
  }

  return s;
}

// ── Build snapshots from moves array ────────────────────────
//  Entry point: call with the record loaded from Firebase.
//  Returns { snapshots, logRows } for the navigation system.
function buildFromRecord(record) {
  // Support both old format (record.log + record.snapshots)
  // and new format (record.moves flat array).
  // Old format: record.log = [{turn, player, actions:[str]}]
  // New format: record.moves = [{turn, player, action:str}]

  let flatMoves = [];

  if (record.moves && record.moves.length > 0) {
    flatMoves = record.moves;
  } else if (record.log && record.log.length > 0) {
    record.log.forEach(entry => {
      (entry.actions || []).forEach(action => {
        flatMoves.push({ turn: entry.turn, player: entry.player, action });
      });
    });
  } else {
    return { snapshots: [], logRows: [] };
  }

  // Extract homeworld initials from setup moves (e.g. "Nexus"→"N", "Vertex"→"V")
  hwLabels = ['', 'P1', 'P2'];
  flatMoves.forEach(mv => {
    const t = (mv.action || '').trim().split(/\s+/);
    let hwName = null;
    if (t[0] === 'set' && t[1] === 'HW' && t[6]) hwName = t[6];       // "set HW b1 y2 ship g3 Nexus"
    else if (t[0] === 'homeworld' && t[4])         hwName = t[4];       // legacy "homeworld r1 b2 g3 HOME1"
    if (hwName) hwLabels[mv.player] = hwName[0].toUpperCase();
  });

  _replayUid = 0;
  let st = makeInitialState();
  const snaps = [];
  const rows  = [];

  // Setup phase: first two entries are homeworld placements
  // currentPlayer alternates after each homeworld action
  let setupDone = 0; // counts homeworld entries processed

  flatMoves.forEach((mv, i) => {
    const parsed = parseNotation(mv.action);
    if (!parsed) return;

    const player = mv.player;

    // Annotations (draw ?, draw Yes, draw No, forfeit) — show in log but don't change board
    if (parsed.type === 'annotation') {
      const pc = player === 1 ? 'ml-p1' : 'ml-p2';
      const pLabel = hwLabels[player] || `P${player}`;
      const prevRow = rows[rows.length - 1];
      const sameT = prevRow && prevRow.turn === mv.turn;
      const turnLabel = sameT
        ? `<span class="ml-turn ml-turn-cont">·</span>`
        : `<span class="ml-turn">${mv.turn}.</span>`;
      rows.push({
        snapIdx: snaps.length - 1, // point to last real board state
        turn: mv.turn, player,
        html: `<span class="mini-log-prefix">${turnLabel}<span class="${pc}">${pLabel}</span>\xa0</span>` +
              `<span class="mini-log-body">${highlightLog(mv.action)}</span>`
      });
      return;
    }

    // Apply the action
    st = applyParsed(st, parsed, player);

    // After homeworld: flip phase/player
    if (parsed.type === 'homeworld') {
      st.currentTurn++;
      setupDone++;
      if (setupDone === 1) {
        st.currentPlayer = 2;
      } else if (setupDone === 2) {
        st.phase = 'PLAY';
        st.currentPlayer = 1;
      }
    }

    // Stamp currentPlayer = the player who made this move so homeworld glow is correct.
    // The replay engine doesn't flip currentPlayer between turns (no explicit end-turn
    // notation), so we set it explicitly here from mv.player.
    st.currentPlayer = player;

    // Take a snapshot after every action
    const snap = JSON.parse(JSON.stringify(st));
    snap.interaction = 'IDLE'; snap.selectedShipId = null;
    snaps.push(snap);

    const pc = player === 1 ? 'ml-p1' : 'ml-p2';
    // FIX 3: Only show turn number on the first action of each turn
    const prevRow = rows[rows.length - 1];
    const sameT = prevRow && prevRow.turn === mv.turn;
    const turnLabel = sameT
      ? `<span class="ml-turn ml-turn-cont">·</span>`
      : `<span class="ml-turn">${mv.turn}.</span>`;
    // FIX 5: Use homeworld initial instead of P1/P2
    const pLabel = hwLabels[player] || `P${player}`;
    rows.push({
      snapIdx: snaps.length - 1,
      turn: mv.turn,
      player,
      html: `<span class="mini-log-prefix">${turnLabel}<span class="${pc}">${pLabel}</span>\xa0</span>` +
            `<span class="mini-log-body">${highlightLog(mv.action)}</span>`
    });
  });

  // Final snapshot reflects end-of-game state
  if (record.winner !== undefined) {
    const last = snaps[snaps.length - 1];
    if (last) { last.phase = 'OVER'; last.winner = record.winner; }
  }

  // FIX 4: Append result summary at end of log
  const isDraw = record.isDraw || record.winner === 0;
  const w = record.winner;
  let resultHtml = '';
  if (isDraw) {
    resultHtml = `<span style="color:#7090b0;letter-spacing:1px">⊘ DRAW</span>`;
  } else if (w === 1 || w === 2) {
    const winLabel = hwLabels[w] || `P${w}`;
    const winColor = w === 1 ? '#4477dd' : '#cc4455';
    const how = record.forfeitedBy ? ' (forfeit)' : '';
    resultHtml = `<span style="color:${winColor};font-weight:bold">★ ${winLabel} WINS${how}</span>`;
  }
  if (resultHtml) {
    rows.push({
      snapIdx: snaps.length - 1, turn: null, player: null, isResult: true,
      html: `<span class="mini-log-prefix"><span class="ml-turn">—</span></span>` +
            `<span class="mini-log-body log-result">${resultHtml}</span>`
    });
  }

  return { snapshots: snaps, logRows: rows };
}

// ════════════════════════════════════════════════════════════
//  END REPLAY ENGINE
// ════════════════════════════════════════════════════════════

let snapshots  = [];
let logEntries = [];
let logRows    = []; // { snapIdx, turn, player, html, isResult? } per action line
let currentIdx = 0;
let currentLogRow = -1; // which log row was most recently navigated to
let winner     = null;
let players    = ['','Player 1','Player 2'];
let hwLabels   = ['','P1','P2']; // homeworld initials e.g. ['','N','V']

// ── Load ─────────────────────────────────────────────────────
async function load() {
  const params = new URLSearchParams(location.search);

  // Standalone sandbox mode — no game needed
  if (params.get('sandbox') === '1') {
    document.getElementById('loading').style.display = 'none';
    // Hide review-only UI, show sandbox toolbar immediately
    document.getElementById('rv-controls').style.display = 'none';
    document.getElementById('sandbox-toolbar').style.display = 'flex';
    // Hide the players section (no real players)
    const ps = document.getElementById('players-section');
    if (ps) ps.style.display = 'none';
    // Start fresh sandbox — _appMode set inside startSandbox
    _appMode = 'review'; // so startSandbox triggers correctly
    startSandbox(false);
    // Override exitSandbox to go to lobby instead of review
    window.exitSandbox = function() {
      location.href = '/lobby/';
    };
    return;
  }

  const puzzleId = params.get('puzzle');
  if (puzzleId) {
    setLoading('Loading puzzle…');
    try {
      const fbApp = initializeApp(firebaseConfig);
      const db    = getDatabase(fbApp);
      const auth  = getAuth(fbApp);
      const user  = await new Promise((res, rej) => {
        const unsub = onAuthStateChanged(auth, u => { unsub(); u ? res(u) : rej(new Error('Not signed in.')); });
      });
      const snap = await get(ref(db, `puzzles/${puzzleId}`));
      if (!snap.exists()) { setLoading('Puzzle not found.'); return; }
      startPuzzle(snap.val(), puzzleId, user, db);
    } catch(e) { setLoading('Failed: ' + e.message); }
    return;
  }

  const gameId = params.get('game');
  if (!gameId) { setLoading('No game ID provided.'); return; }

  if (gameId.startsWith('local-')) {
    const raw = sessionStorage.getItem('hw_review_' + gameId);
    if (!raw) { setLoading('Local game not found (session may have ended).'); return; }
    init(JSON.parse(raw)); return;
  }

  setLoading('Authenticating…');
  try {
    const fbApp = initializeApp(firebaseConfig);
    const db    = getDatabase(fbApp);
    const auth  = getAuth(fbApp);
    await new Promise((res, rej) => {
      const unsub = onAuthStateChanged(auth, u => {
        unsub(); u ? res(u) : rej(new Error('Not signed in — please sign in via the lobby.'));
      });
    });
    setLoading('Loading game…');
    const snap = await get(ref(db, `gamesPlayed/${gameId}`));
    if (!snap.exists()) { setLoading('GAME RECORD NOT FOUND'); document.getElementById('loading-back').style.display='inline-block'; return; }
    init(snap.val());
  } catch(e) {
    setLoading('Failed to load: ' + e.message);
  }
}

function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

function init(record) {
  // Support both new format {players:{1:{name},2:{name}}} and old {players:['',name1,name2]}
  if (Array.isArray(record.players)) {
    // Players array may contain objects {name, uid, eloAtGame} or plain strings
    // Normalize to plain strings for display
    players = record.players.map((p, i) => {
      if (!p) return i === 0 ? null : `Player ${i}`;
      if (typeof p === 'string') return p;
      if (typeof p === 'object') return p.name || `Player ${i}`;
      return `Player ${i}`;
    });
  } else if (record.players && typeof record.players === 'object') {
    // Object keyed by "1"/"2"
    players = ['', record.players[1]?.name || 'Player 1', record.players[2]?.name || 'Player 2'];
  } else {
    players = ['','Player 1','Player 2'];
  }
  winner = record.winner;

  // ── Build snapshots via deterministic replay ──────────────
  // Works with both old (record.log + record.snapshots) and
  // new (record.moves) formats. Snapshots are never stored in
  // Firebase anymore — rebuilt client-side from the move log.
  const built = buildFromRecord(record);
  snapshots = built.snapshots;
  logRows   = built.logRows;

  if (!snapshots.length) { setLoading('No move data in this game record.'); return; }

  // Update homeworld zone labels with real player names
  const _zl1 = document.querySelector('[data-zone="1"]');
  const _zl2 = document.querySelector('[data-zone="2"]');
  if (_zl1) _zl1.textContent = `— ${(players[1] || 'Player 1').toUpperCase()} HOMEWORLD —`;
  if (_zl2) _zl2.textContent = `— ${(players[2] || 'Player 2').toUpperCase()} HOMEWORLD —`;

  // Player cards — include avatar image if stored in record.players
  // record.players may be array OR object keyed by "1"/"2" (new CF format)
  const rawPlayers = Array.isArray(record.players)
    ? record.players
    : ['', record.players?.[1] || null, record.players?.[2] || null];
  const ps = document.getElementById('players-section');
  [1, 2].forEach(p => {
    const isW = p === winner;
    const name = players[p] || `Player ${p}`;
    const raw  = rawPlayers[p];
    const avatarSrc = (typeof raw === 'object' && raw) ? (raw.avatarBase64 || raw.avatarUrl || '') : '';
    const initial = hwLabels[p] || name[0].toUpperCase();
    const avatarInner = avatarSrc
      ? `<img src="${avatarSrc}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : initial;
    const d = document.createElement('div');
    d.className = 'rv-player' + (isW ? ' winner' : '');
    d.innerHTML = `
      <div class="rv-avatar p${p}">${avatarInner}</div>
      <div>
        <div class="rv-info-name">${esc(name)}</div>
        <div class="rv-info-result">${isW ? '🏆 Winner' : 'Defeated'}</div>
      </div>
      ${isW ? '<div class="rv-crown">⭐</div>' : ''}`;
    ps.appendChild(d);
  });
  // review-sub removed

  // ── Unseen result overlay (arrives from profile via ?unseen=1) ──
  const _urlParams = new URLSearchParams(location.search);
  if (_urlParams.get('unseen') === '1') {
    const ov   = document.getElementById('unseen-overlay');
    const isDraw = winner === 0;
    const p1name = players[1] || 'Player 1';
    const p2name = players[2] || 'Player 2';

    // Build title
    const uo_title = document.getElementById('uo-title');
    const uo_sub   = document.getElementById('uo-subtitle');
    if (isDraw) {
      uo_title.textContent = 'STRATEGIC DRAW';
      uo_title.style.color = '#88bbcc';
      uo_sub.textContent   = 'Neither commander blinked';
    } else {
      const winName  = players[winner] || `Player ${winner}`;
      uo_title.textContent = `${winName.toUpperCase()} WINS`;
      uo_title.style.color = winner === 1 ? '#4488ff' : '#ff4455';
      uo_sub.textContent   = 'The cosmos have been conquered';
    }

    // Build player cards
    const uo_ps = document.getElementById('uo-players');
    const rawPlayersUO = Array.isArray(record.players)
      ? record.players
      : ['', record.players?.[1] || null, record.players?.[2] || null];
    [1, 2].forEach(p => {
      const isW  = p === winner;
      const name = players[p] || `Player ${p}`;
      const raw  = rawPlayersUO[p];
      const av   = (typeof raw === 'object' && raw) ? (raw.avatarBase64 || raw.avatarUrl || '') : '';
      const avContent = av ? `<img src="${av}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (hwLabels[p] || name[0].toUpperCase());
      const borderColor = isW ? (isDraw ? '#88bbcc' : '#ffcc00') : '#1c2840';
      const resultLabel = isDraw ? 'DRAW' : (isW ? '★ WINNER' : 'DEFEATED');
      const resultColor = isDraw ? '#6090a0' : (isW ? '#ffcc00' : '#884444');
      const div = document.createElement('div');
      div.className = 'uo-player';
      div.innerHTML = `
        <div class="uo-avatar" style="border-color:${borderColor}">${avContent}</div>
        <div class="uo-name">${esc(name)}</div>
        <div class="uo-result" style="color:${resultColor}">${resultLabel}</div>`;
      uo_ps.appendChild(div);
      if (p === 1) {
        const vs = document.createElement('div');
        vs.className = 'uo-vs';
        vs.textContent = 'VS';
        uo_ps.appendChild(vs);
      }
    });

    document.getElementById('uo-profile').onclick = () => { location.href = '/profile/'; };
    document.getElementById('uo-continue').onclick = () => { ov.classList.remove('show'); };
    ov.classList.add('show');
  }

  // Render log panel (clickable)
  const logContainer = document.getElementById('log-entries');
  logContainer.innerHTML = logRows.map((r, i) =>
    `<div class="mini-log-line" data-i="${i}">${r.html}</div>`
  ).join('');
  logContainer.querySelectorAll('.mini-log-line').forEach(el => {
    el.onclick = () => {
      const row = logRows[+el.dataset.i];
      if (!row || row.isResult) return; // result line is display-only
      currentLogRow = +el.dataset.i;
      goTo(row.snapIdx);
    };
  });

  // Nav buttons
  function navToSnap(idx) {
    currentLogRow = logRows.findIndex(r => r.snapIdx === idx);
    goTo(idx);
  }
  function navDelta(delta) {
    const newIdx = Math.max(0, Math.min(snapshots.length - 1, currentIdx + delta));
    navToSnap(newIdx);
  }
  document.getElementById('nav-first').onclick = () => navToSnap(0);
  document.getElementById('nav-prev').onclick  = () => navDelta(-1);
  document.getElementById('nav-next').onclick  = () => navDelta(1);
  document.getElementById('nav-last').onclick  = () => navToSnap(snapshots.length - 1);
  document.addEventListener('keydown', e => {
      let handled = false;
      if (e.shiftKey && e.key === 'ArrowLeft')  { navToSnap(0); handled = true; }
      else if (e.shiftKey && e.key === 'ArrowRight') { navToSnap(snapshots.length - 1); handled = true; }
      else if (e.key === 'ArrowLeft')   { navDelta(-1); handled = true; }
      else if (e.key === 'ArrowRight') { navDelta(1); handled = true; }
      else if (e.key === 'Home') { navToSnap(0); handled = true; }
      else if (e.key === 'End')  { navToSnap(snapshots.length - 1); handled = true; }
      if (handled) e.preventDefault();
    });

  document.getElementById('loading').style.display = 'none';
  // Highlight last actual move, not the result summary line
  const lastMoveRow = logRows.reduce((best, r, i) => (!r.isResult ? i : best), logRows.length - 1);
    currentLogRow = lastMoveRow;
    goTo(snapshots.length - 1);
    // After initial render, scroll log to very bottom so result line is visible
    requestAnimationFrame(() => {
      const logEl = document.getElementById('log-entries');
      if (logEl) logEl.scrollTop = logEl.scrollHeight;
    });
}

function goTo(idx) {
  if (_appMode === 'sandbox') return;
  currentIdx = idx;
  // Deep-clone snapshot so we can safely override flags
  G = JSON.parse(JSON.stringify(snapshots[idx]));
  // Reset arrows when navigating turns
  if (typeof _arrows !== 'undefined') _arrows.length = 0;
  _arrowPid = 0;
  // Force read-only: no interactive state, no selection
  G.interaction    = 'IDLE';
  G.selectedShipId = null;
  G.movingFromSysId= null;
  G.sacrificePool  = { color: null, count: 0 };
  renderBank();
  renderBoard();
  updateNav();
  updateLogHighlight();
}

// ══════════════════════════════════════════════
//  PUZZLE MODE
// ══════════════════════════════════════════════
let _puzzleMeta = null; // { id, player, goalMoves, db, user }
let _puzzleTurnSnaps = []; // stack of G snapshots for "previous move"

function startPuzzle(data, puzzleId, user, db) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('rv-controls').style.display = 'none';
  const mobileTitle = document.getElementById('rv-mobile-title');
  if (mobileTitle) mobileTitle.textContent = 'PUZZLE';
  const ps = document.getElementById('players-section');
  if (ps) ps.style.display = 'none';

  _appMode = 'sandbox';
  _puzzleMeta = { id: puzzleId, player: data.puzzlePlayer, goalMoves: data.goalMoves, db, user, data };
  _puzzleTurnSnaps = [];

  // Build G from puzzle's saved board state
  G = {
    phase: 'PLAY',
    currentPlayer: data.puzzlePlayer,
    systems: JSON.parse(JSON.stringify(data.systems)),
    bank: JSON.parse(JSON.stringify(data.bank)),
    interaction: 'IDLE', selectedShipId: null, movingFromSysId: null,
    sacrificePool: { color: null, count: 0 },
    turnUsed: false, history: null,
    log: [], _pendingActions: [], currentTurn: 1,
    customPhase: null,
  };
  uid = 0;
  G.systems.forEach(sys => {
    uid = Math.max(uid, sys.id || 0);
    sys.ships.forEach(s => { uid = Math.max(uid, s.id || 0); });
  });
  G._turnStart = JSON.stringify(G); // snap clean start-of-turn state

  // Show puzzle toolbar
  const toolbar = document.getElementById('sandbox-toolbar');
  toolbar.style.display = 'flex';
  toolbar.innerHTML = '';

  const _tb = (tag, css, text) => {
    const el = document.createElement(tag);
    if (css) el.style.cssText = css;
    if (text) el.textContent = text;
    return el;
  };
  toolbar.appendChild(_tb('div', "font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#ddeeff;letter-spacing:1px;margin-bottom:2px", data.name || 'Untitled Puzzle'));

  // Creator name
  const creatorEl = _tb('div', 'font-size:11px;color:#3a5060;letter-spacing:1px', 'by ' + (data.createdByName || 'Pilot') + ' · P' + data.puzzlePlayer);
  toolbar.appendChild(creatorEl);

  // Side-by-side stat boxes
  const statsRow = document.createElement('div');
  statsRow.style.cssText = 'display:flex;gap:8px;margin-top:4px';

  const goalBox = document.createElement('div');
  goalBox.style.cssText = 'flex:1;background:rgba(255,255,255,0.03);border:1px solid #2a3850;border-radius:4px;padding:6px 8px;text-align:center';
  goalBox.innerHTML = '<div style="font-size:10px;color:#506070;letter-spacing:1px;margin-bottom:2px">TARGET</div>' +
    '<div id="puzzle-goal" style="font-family:Orbitron,sans-serif;font-size:20px;font-weight:700;color:#ffcc00">' + data.goalMoves + '</div>';

  const movesBox = document.createElement('div');
  movesBox.style.cssText = 'flex:1;background:rgba(255,255,255,0.03);border:1px solid #2a3850;border-radius:4px;padding:6px 8px;text-align:center';
  movesBox.innerHTML = '<div style="font-size:10px;color:#506070;letter-spacing:1px;margin-bottom:2px">MOVES</div>' +
    '<div id="puzzle-moves" style="font-family:Orbitron,sans-serif;font-size:20px;font-weight:700;color:#4488ff">0</div>';

  statsRow.appendChild(goalBox);
  statsRow.appendChild(movesBox);
  toolbar.appendChild(statsRow);

  if (user && data.createdBy === user.uid) {
    const delBtn = _tb('button', 'padding:6px 10px;background:transparent;border:1px solid #3a1a22;color:#5a3040;font-family:Share Tech Mono,monospace;font-size:11px;cursor:pointer;border-radius:4px;transition:all .15s', '\u2715 DELETE PUZZLE');
    delBtn.onmouseover = () => { delBtn.style.color='#cc3344'; delBtn.style.borderColor='#cc3344'; };
    delBtn.onmouseout  = () => { delBtn.style.color='#5a3040'; delBtn.style.borderColor='#3a1a22'; };
    delBtn.onclick = () => deletePuzzle();
    toolbar.appendChild(delBtn);
  }

  // Render solvers below log
  renderPuzzleSolvers(data);

  renderBank(); renderBoard(); renderSidebar(); renderLog();
}

window.deletePuzzle = async function() {
  if (!_puzzleMeta) return;
  if (!confirm('Delete this puzzle? This cannot be undone.')) return;
  try {
    const { remove } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
    await remove(ref(_puzzleMeta.db, `puzzles/${_puzzleMeta.id}`));
    location.href = '/lobby/';
  } catch(e) { alert('Failed to delete: ' + e.message); }
};

function renderPuzzleSolvers(data) {
  const logPanel = document.getElementById('log-panel');
  if (!logPanel) return;
  document.getElementById('_puzzle_solvers')?.remove();
  const solvers = data.solvers ? Object.values(data.solvers) : [];
  solvers.sort((a, b) => a.moves !== b.moves ? a.moves - b.moves : a.solvedAt - b.solvedAt);
  const div = document.createElement('div');
  div.id = '_puzzle_solvers';
  div.style.cssText = 'border-top:1px solid #1c2840;padding:8px 10px;flex-shrink:0';
  const title = document.createElement('div');
  title.style.cssText = 'font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:2px;color:#4a6080;margin-bottom:6px';
  title.textContent = 'SOLVERS';
  div.appendChild(title);
  if (!solvers.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'font-size:11px;color:#253040;text-align:center;padding:6px 0';
    empty.textContent = 'No solvers yet. Be the first!';
    div.appendChild(empty);
  } else {
    solvers.slice(0, 10).forEach((s, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#4a6080';
      row.innerHTML = `<span style="color:${i===0?'#ffcc00':'#4a6080'}">${i===0?'🏆 ':''}${esc(s.name)}</span><span style="color:#2a4060">${s.moves} move${s.moves!==1?'s':''}</span>`;
      div.appendChild(row);
    });
  }
  logPanel.after(div);
}

function puzzleEndTurn() {
  if (!_puzzleMeta) return;
  if (G.phase !== 'PLAY') return;

  // Snap current turn-start state BEFORE any moves this turn
  // G._turnStart is set at end of previous puzzleEndTurn — but on turn 1 it may be null
  const snapToSave = G._turnStart || JSON.stringify(G);
  _puzzleTurnSnaps.push(snapToSave);
  console.log('[puzzleEndTurn] saved snap, total snaps:', _puzzleTurnSnaps.length); //delete this

  // Log and commit puzzle player's turn
  if (!G.turnUsed && G.sacrificePool.count === 0 && (!G._pendingActions?.length)) {
    logAction(Note.skip());
  }
  commitTurnLog();

  // Check win BEFORE auto-passing (player just moved)
  const won = checkWin();
  if (won) return; // checkWin() shows popup

  // Auto-pass opponent
  G.currentPlayer = 3 - _puzzleMeta.player;
  G.turnUsed = false; G.sacrificePool = { color: null, count: 0 };
  G.selectedShipId = null; G.interaction = 'IDLE';
  logAction(Note.skip());
  commitTurnLog();

  // Back to puzzle player
  G.currentPlayer = _puzzleMeta.player;
  G.turnUsed = false; G.sacrificePool = { color: null, count: 0 };
  G.selectedShipId = null; G.movingFromSysId = null; G.interaction = 'IDLE';
  G.history = null; G._turnStart = null; G._turnStart = JSON.stringify(G);

  // Update move counter display
  const moveCount = _puzzleTurnSnaps.length;
  const moveEl = document.getElementById('puzzle-moves');
  if (moveEl) moveEl.textContent = moveCount;

  render();
}

const SB_SAVE_KEY = 'hw_sandbox_save';

function saveSandboxState() {
  if (_appMode !== 'sandbox' || !G) return;
  try {
    const save = {
      G: {
        ...G,
        history: null,
        _turnStart: null,
        _gameSnapshots: null,
      },
      ts: Date.now()
    };
    localStorage.setItem(SB_SAVE_KEY, JSON.stringify(save));
  } catch(e) {}
}

function clearSandboxState() {
  localStorage.removeItem(SB_SAVE_KEY);
}

function freshSandbox() {
  const saved = localStorage.getItem(SB_SAVE_KEY);
  if (saved) {
    const confirmed = confirm('Start a fresh sandbox? Your saved sandbox session will be lost.');
    if (!confirmed) return;
    clearSandboxState();
  }
  _appMode = 'review'; // so startSandbox triggers correctly
  startSandbox(false);
}

window.startSandbox = function startSandbox(fromCurrentSnapshot) {
  _appMode = 'sandbox';
  let _restored = false;
  if (!fromCurrentSnapshot) {
    const saved = localStorage.getItem(SB_SAVE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.G) { G = parsed.G; _restored = true; }
      } catch(e) {}
    }
  }
  if (!_restored) {
    G = fromCurrentSnapshot ? JSON.parse(JSON.stringify(snapshots[currentIdx])) : makeInitialState();
  }
  // Set uid above all existing IDs to prevent collisions with snapshot ship/system IDs
  uid = 0;
  G.systems.forEach(sys => {
    uid = Math.max(uid, sys.id || 0);
    sys.ships.forEach(ship => { uid = Math.max(uid, ship.id || 0); });
  });
  // Always reset interaction state
  G.interaction = 'IDLE'; G.selectedShipId = null;
  G._pendingActions = []; G.log = []; G.currentTurn = 1;
  G.customMidAdding = false;
  G.customShipOwner = null; G.customShipSys = null;
  G.customEditingHW = null;
  G.firstMover = G.firstMover || 1;

  if (_restored) {
    // Restored from save — preserve phase, customPhase, setupDone/Step/Cache from saved G
    // Only ensure sacrificePool is clean
    G.sacrificePool = G.sacrificePool || { color: null, count: 0 };
    G.turnUsed = G.turnUsed || false;
  } else if (fromCurrentSnapshot) {
    G.customPhase = null;
    G.turnUsed = false; G.sacrificePool = { color: null, count: 0 };
    G.setupDone = false; G.setupStep = 0; G.setupCache = { stars: [] };
    const existingHWs = G.systems.filter(s => s.isHomeworld);
    if (existingHWs.length < 2 || G.phase === 'SETUP') {
      if (existingHWs.length === 0) {
        G.phase = 'SETUP'; G.currentPlayer = 1; G.firstMover = 1;
      } else if (existingHWs.length === 1) {
        G.phase = 'SETUP';
        G.firstMover = existingHWs[0].isHomeworld;
        G.currentPlayer = 3 - G.firstMover;
      }
    } else {
      G.phase = 'PLAY';
      delete G.winner;
      G.currentPlayer = 3 - G.currentPlayer;
    }
  } else {
    G.customPhase = 'HW1_STARS';
    G.turnUsed = false; G.sacrificePool = { color: null, count: 0 };
    G.setupDone = false; G.setupStep = 0; G.setupCache = { stars: [] };
    G.phase = 'SETUP'; G.currentPlayer = 1; G.firstMover = 1;
  }
  // show/hide sandbox UI elements
  document.getElementById('sandbox-toolbar').style.display = 'flex';
  document.getElementById('rv-controls').style.display = 'none';
  document.body.classList.add('sandbox-mode');
  renderBank(); renderBoard(); renderSidebar(); renderLog();
  document.getElementById('log-turn-count').textContent = '—';
}
window.exitSandbox = function exitSandbox() {
  _appMode = 'review';
  document.getElementById('sandbox-toolbar').style.display = 'none';
  document.getElementById('rv-controls').style.display = '';
  document.body.classList.remove('sandbox-mode');

function updateLogHighlight() {
  const container = document.getElementById('log-entries');
  container.querySelectorAll('.mini-log-line').forEach(el => {
    const i = +el.dataset.i;
    // Highlight only the single row that corresponds to the current navigation point
    const active = (currentLogRow >= 0) ? i === currentLogRow : logRows[i]?.snapIdx === currentIdx && i === logRows.findIndex(r => r.snapIdx === currentIdx);
    el.classList.toggle('active', active);
    if (active) {
      const container = document.getElementById('log-entries');
      const elTop = el.offsetTop - container.offsetTop;
      const elBot = elTop + el.offsetHeight;
      const scrollTop = container.scrollTop;
      const viewH = container.clientHeight;
      if (elTop < scrollTop) container.scrollTop = elTop;
      else if (elBot > scrollTop + viewH) container.scrollTop = elBot - viewH;
    }
  });
}

// ── Arrow drawing (identical to game.html) ──────────────────
// Declared BEFORE load() so goTo() can access them (const is not hoisted)
const _arrows   = [];   // { fromPid, toPid, color }
let   _arrowDrag = null; // { fromPid, fromEl, alt }
let _arrowsListening = false;
load();
/** Called by renderSystem to stamp a unique ID on each piece element */
function _stampPid(el) {
  const pid = 'p' + (++_arrowPid);
  el.dataset.pid = pid;
  return pid;
}

/** Get center coords of a [data-pid] element relative to #board */
function _pidCenter(pid) {
  const el = document.querySelector(`[data-pid="${pid}"]`);
  if (!el) return null;
  const board = document.getElementById('board');
  const br = board.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return {
    x: er.left + er.width  / 2 - br.left + board.scrollLeft,
    y: er.top  + er.height / 2 - br.top  + board.scrollTop,
  };
}

/** Find the nearest [data-pid] element to a client coordinate */
function _nearestPid(clientX, clientY) {
  const board = document.getElementById('board');
  const br    = board.getBoundingClientRect();
  let best = null, bestD = Infinity;
  board.querySelectorAll('[data-pid]').forEach(el => {
    const r  = el.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    const d  = Math.hypot(cx - clientX, cy - clientY);
    if (d < bestD) { bestD = d; best = { pid: el.dataset.pid, cx: cx - br.left + board.scrollLeft, cy: cy - br.top + board.scrollTop }; }
  });
  return bestD < 72 ? best : null;
}

function _renderArrows() {
  const svg = document.getElementById('arrow-svg');
  if (!svg) return;
  svg.querySelectorAll('.a-arrow, .a-preview').forEach(el => el.remove());

  _arrows.forEach(a => {
    const from = _pidCenter(a.fromPid);
    const to   = _pidCenter(a.toPid);
    if (!from || !to) return;
    const col  = a.color === 'orange' ? 'rgba(255,160,40,0.65)' : 'rgba(80,200,255,0.65)';
    const mid  = a.color === 'orange' ? 'url(#arrowhead-orange)' : 'url(#arrowhead-blue)';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','a-arrow');
    line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);   line.setAttribute('y2', to.y);
    line.setAttribute('stroke', col);
    line.setAttribute('stroke-width','7');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('marker-end', mid);
    svg.appendChild(line);
  });
}

function _initArrows() {
  if (_arrowsListening) return;
  _arrowsListening = true;

  const board = document.getElementById('board');

  // Block context menu anywhere inside board (capture beats native image menu)
  document.addEventListener('contextmenu', e => {
    if (board && board.contains(e.target)) e.preventDefault();
  }, { capture: true });

  // Right-mousedown → start drag from nearest piece
  document.addEventListener('mousedown', e => {
    if (e.button !== 2) return;
    const board = document.getElementById('board');
    if (!board || !board.contains(e.target)) return;
    const hit = _nearestPid(e.clientX, e.clientY);
    if (!hit) return;
    e.preventDefault();
    _arrowDrag = { fromPid: hit.pid, fromX: hit.cx, fromY: hit.cy, alt: e.altKey };
  }, { capture: true, passive: false });

  // Mousemove → dashed preview line
  document.addEventListener('mousemove', e => {
    const svg = document.getElementById('arrow-svg');
    if (!svg) return;
    svg.querySelectorAll('.a-preview').forEach(el => el.remove());
    if (!_arrowDrag) return;
    const board = document.getElementById('board');
    const br  = board.getBoundingClientRect();
    const x2  = e.clientX - br.left + board.scrollLeft;
    const y2  = e.clientY - br.top  + board.scrollTop;
    const col = _arrowDrag.alt ? 'rgba(255,160,40,0.45)' : 'rgba(80,200,255,0.45)';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','a-preview');
    line.setAttribute('x1', _arrowDrag.fromX); line.setAttribute('y1', _arrowDrag.fromY);
    line.setAttribute('x2', x2);               line.setAttribute('y2', y2);
    line.setAttribute('stroke', col);
    line.setAttribute('stroke-width','6');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-dasharray','10 6');
    svg.appendChild(line);
  });

  // Mouseup → commit or cancel
  document.addEventListener('mouseup', e => {
    if (e.button !== 2) return;
    const svg = document.getElementById('arrow-svg');
    if (svg) svg.querySelectorAll('.a-preview').forEach(el => el.remove());
    if (!_arrowDrag) return;
    const drag = _arrowDrag;
    _arrowDrag = null;

    const hit = _nearestPid(e.clientX, e.clientY);
    if (!hit || hit.pid === drag.fromPid) return; // no movement or same piece

    const color = drag.alt ? 'orange' : 'blue';
    const idx = _arrows.findIndex(a => a.fromPid === drag.fromPid && a.toPid === hit.pid && a.color === color);
    if (idx >= 0) _arrows.splice(idx, 1); // toggle off
    else _arrows.push({ fromPid: drag.fromPid, toPid: hit.pid, color });
    _renderArrows();
  });

  // Left-click on board → clear all arrows
  document.addEventListener('click', e => {
    const board = document.getElementById('board');
    if (!board || !board.contains(e.target)) return;
    if (_arrows.length === 0) return;
    _arrows.length = 0;
    _renderArrows();
  });
}

// ============================================================
//  PIECE MOVE ANIMATION  (FLIP + ghost-from-bank)
// ============================================================
(function () {
  const MS = 350;

  function runWithAnim(fn, ctx, args) {
    const inSetup = typeof G !== 'undefined' && G && G.phase === 'SETUP';
    console.log('[ANIM] fired — phase:', G?.phase, 'setupDone:', G?.setupDone,
      'setupStep:', G?.setupStep, 'cacheLen:', G?.setupCache?.stars?.length);

    // Snapshot all current piece positions before render
    const snap = {};
    document.querySelectorAll('[data-anim-key]').forEach(el => {
      const bpw = el.querySelector('.bank-piece-wrap');
      snap[el.dataset.animKey] = {
        rect: el.getBoundingClientRect(),
        html: bpw ? bpw.innerHTML : el.innerHTML
      };
    });
    console.log('[ANIM] snapped', Object.keys(snap).length, 'keys');

    fn.apply(ctx, args);

    // ── Forward: board/preview pieces that are new or moved ──
    const _skipPreview = !!window._animSkipSetupPreview;
    window._animSkipSetupPreview = false;

    // Pass 1: FLIP system cards that shifted position (e.g. when a mid-system disappears)
    const cardDeltas = {};
    if (!inSetup) {
      document.querySelectorAll('[data-anim-key^="syscard:"]').forEach(card => {
        const key = card.dataset.animKey;
        if (!snap[key]) return;
        const last = card.getBoundingClientRect();
        const dx = snap[key].rect.left - last.left;
        const dy = snap[key].rect.top  - last.top;
        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
        const sysId = key.split(':')[1];
        cardDeltas[sysId] = { dx, dy };
        card.style.transition = 'none';
        card.style.transform  = 'translate(' + dx + 'px,' + dy + 'px)';
        card.offsetHeight;
        card.style.transition = 'transform ' + MS + 'ms cubic-bezier(0.2,0,0.2,1)';
        card.style.transform  = '';
        card.addEventListener('transitionend', () => {
          card.style.transition = '';
          card.style.transform  = '';
        }, { once: true });
      });
    }

    // Pass 2: FLIP/ghost individual pieces
    document.querySelectorAll('[data-anim-key]').forEach(el => {
      const key   = el.dataset.animKey;
      const parts = key.split(':');
      if (parts[0] === 'bank' || parts[0] === 'syscard') return;
      const last = el.getBoundingClientRect();

      if (snap[key] && !inSetup) {
        // FLIP — piece existed, animate from old position to new
        const dx = snap[key].rect.left - last.left;
        const dy = snap[key].rect.top  - last.top;
        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
        // Skip if parent system card FLIP already covers this movement
        const parentCard = el.closest('[data-anim-key^="syscard:"]');
        if (parentCard) {
          const cd = cardDeltas[parentCard.dataset.animKey.split(':')[1]];
          if (cd && Math.abs(dx - cd.dx) < 3 && Math.abs(dy - cd.dy) < 3) return;
        }
        console.log('[ANIM] FLIP:', key, '→ dx:', Math.round(dx), 'dy:', Math.round(dy));
        el.style.transition = 'none';
        el.style.transform  = 'translate(' + dx + 'px,' + dy + 'px)';
        el.offsetHeight;
        el.style.transition = 'transform ' + MS + 'ms cubic-bezier(0.2,0,0.2,1)';
        el.style.transform  = '';
        el.addEventListener('transitionend', () => {
          el.style.transition = '';
          el.style.transform  = '';
        }, { once: true });

      } else if (!snap[key]) {
        // Ghost — new piece, fly from source to destination
        const isPreview = parts[0] === 'setuppreview';
        if (isPreview && _skipPreview) return;
        const color   = isPreview ? parts[1] : parts[2];
        const size    = isPreview ? parts[2] : parts[3];
        const starIdx = isPreview ? parts[3] : parts[4];

        // For newly finalized homeworld stars: prefer setuppreview position as source
        // so the star flies from the preview card → final homeworld card (not from bank)
        const spKey  = (parts[0] === 'star' && starIdx !== undefined)
          ? 'setuppreview:' + color + ':' + size + ':' + starIdx
          : null;
        const srcKey = (spKey && snap[spKey]) ? spKey : 'bank:' + color + ':' + size;

        if (!snap[srcKey]) {
          console.log('[ANIM] ghost skipped — no source for:', key, '(tried', srcKey + ')');
          return;
        }
        console.log('[ANIM] ghost:', key, 'from', srcKey);

        const fr = snap[srcKey].rect;
        const g  = document.createElement('div');
        g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;display:inline-block;' +
          'left:' + fr.left + 'px;top:' + fr.top + 'px;will-change:transform;transition:none;';
        g.innerHTML = el.innerHTML;
        document.body.appendChild(g);

        const gR = g.getBoundingClientRect();
        const dx = (last.left + last.width  / 2) - (gR.left + gR.width  / 2);
        const dy = (last.top  + last.height / 2) - (gR.top  + gR.height / 2);
        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) { g.remove(); return; }

        // Hide real piece — ghost covers destination during flight
        const _el = el;
        _el.style.visibility = 'hidden';

        g.style.transition = 'transform ' + MS + 'ms cubic-bezier(0.2,0,0.2,1)';
        g.style.transform  = 'translate(' + dx + 'px,' + dy + 'px)';
        g.addEventListener('transitionend', () => {
          g.remove();
          _el.style.visibility = '';
        }, { once: true });
        setTimeout(() => {
          if (g.parentNode) g.remove();
          _el.style.visibility = '';
        }, MS + 200);
      }
    });

    // ── Reverse: board/preview pieces that disappeared → fly back to bank ──
    Object.entries(snap).forEach(([key, info]) => {
      if (key.startsWith('bank:') || key.startsWith('syscard:')) return;
      if (_skipPreview && (key.startsWith('star:') || key.startsWith('setuppreview:'))) return;
      if (document.querySelector('[data-anim-key="' + key + '"]')) return;

      // For setuppreview stars: only reverse-ghost if there's NO corresponding
      // system star being forward-ghosted (which means they went to bank, not finalized)
      if (key.startsWith('setuppreview:')) {
        const sp = key.split(':'); // setuppreview:color:size:idx
        let hasForwardGhost = false;
        document.querySelectorAll('[data-anim-key^="star:"]').forEach(el => {
          const k = el.dataset.animKey.split(':');
          if (k[2] === sp[1] && k[3] === sp[2] && k[4] === sp[3] && !snap[el.dataset.animKey]) {
            hasForwardGhost = true;
          }
        });
        if (hasForwardGhost) {
          console.log('[ANIM] skipping reverse for', key, '(star being forward-ghosted to system)');
          return;
        }
      }

      const parts = key.split(':');
      const isRevPrev = parts[0] === 'setuppreview';
      const color = isRevPrev ? parts[1] : parts[2];
      const size  = isRevPrev ? parts[2] : parts[3];
      const bkEl  = document.querySelector('[data-anim-key="bank:' + color + ':' + size + '"]');
      if (!bkEl) return;

      console.log('[ANIM] reverse ghost:', key, '→ bank:', color, size);
      const dest = bkEl.getBoundingClientRect();
      const g = document.createElement('div');
      g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;display:inline-block;' +
        'left:' + info.rect.left + 'px;top:' + info.rect.top + 'px;will-change:transform;transition:none;';
      g.innerHTML = info.html;
      document.body.appendChild(g);
      const gR = g.getBoundingClientRect();
      const dx = (dest.left + dest.width  / 2) - (gR.left + gR.width  / 2);
      const dy = (dest.top  + dest.height / 2) - (gR.top  + gR.height / 2);
      if (Math.abs(dx) < 2 && Math.abs(dy) < 2) { g.remove(); return; }
      g.style.transition = 'transform ' + MS + 'ms cubic-bezier(0.2,0,0.2,1)';
      g.style.transform  = 'translate(' + dx + 'px,' + dy + 'px)';
      g.addEventListener('transitionend', () => g.remove(), { once: true });
      setTimeout(() => { if (g.parentNode) g.remove(); }, MS + 200);
    });
  }

  const _origRender = render;
  render = function () { runWithAnim(_origRender, this, arguments); };

  const _origGoTo = goTo;
  goTo = function () { runWithAnim(_origGoTo, this, arguments); };

}());


</script>

<script>
// Wire bottom nav buttons to the same navigation functions as desktop
(function() {
  function syncBottomNav() {
      const ind = document.getElementById('turn-indicator');
      if (ind) {
        // turn-indicator innerHTML is like: <span style="color:#4477dd;font-weight:bold">N</span>&nbsp;MOVE 9 / 11
        const bnav = document.getElementById('bnav-turn');
        // Extract player initial span and the rest
        const match = ind.innerHTML.match(/<span[^>]*color:\s*([^;"]+)[^>]*>([^<]+)<\/span>\s*&nbsp;\s*(.*)/i);
        if (match) {
          const color = match[1];
          const initial = match[2].trim();
          const rest = match[3].trim(); // e.g. "MOVE 9 / 11"
          bnav.innerHTML = `<span style="color:${color};font-size:14px;font-weight:900;line-height:1">${initial}</span><span style="font-size:9px;color:#6080a0;letter-spacing:1px">${rest}</span>`;
        } else {
          bnav.textContent = ind.textContent;
        }
      }
    ['first','prev','next','last'].forEach(k => {
      const src = document.getElementById(`nav-${k}`);
      const dst = document.getElementById(`bnav-${k}`);
      if (src && dst) dst.disabled = src.disabled;
    });
  }
  // Delegate clicks to the desktop buttons
  ['first','prev','next','last'].forEach(k => {
    const btn = document.getElementById(`bnav-${k}`);
    if (btn) btn.addEventListener('click', () => {
      document.getElementById(`nav-${k}`)?.click();
      setTimeout(syncBottomNav, 50);
    });
  });
  // Sync turn indicator periodically
  const origIndicator = document.getElementById('turn-indicator');
  if (origIndicator) {
    const obs = new MutationObserver(syncBottomNav);
    obs.observe(origIndicator, { childList: true, characterData: true, subtree: true });
  }
  // Also sync on nav button state changes
  ['first','prev','next','last'].forEach(k => {
    const src = document.getElementById(`nav-${k}`);
    if (src) {
      const obs = new MutationObserver(syncBottomNav);
      obs.observe(src, { attributes: true });
    }
  });
  syncBottomNav();
})();
</script>
