  }

  // Single inline row: ▽ ships (left) · stars (centre) · △ ships (right)
  const downShips = sys.ships.filter(s => s.owner === 2);
  const upShips   = sys.ships.filter(s => s.owner === 1);

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-height:36px;margin-top:6px;';

  // ── Precompute shortcut context for this system ──────────────
  const selShip   = G.phase === 'PLAY' ? findShip(G.selectedShipId) : null;
  const selSys    = selShip ? findSystemByShip(G.selectedShipId) : null;
  const isSelSys  = selSys && selSys.id === sys.id; // selected ship lives here
  const sacPool   = G.sacrificePool.count > 0;
  const sysPowers = G.phase === 'PLAY' ? getSystemPowers(sys, G.currentPlayer) : new Set();

  // Is this system a valid move destination right now?
  const isMoveDest = G.interaction === 'MOVING' && selSys &&
    sys.id !== selSys.id && isConnected(selSys, sys);

  // Helper: build a ship wrap element
  function makeShipWrap(ship) {
    const wrap = document.createElement('div');
    wrap.className = 'ship-wrap';
    wrap.dataset.animKey = 'ship:' + ship.id + ':' + ship.color + ':' + ship.size;
    const isOwn    = ship.owner === G.currentPlayer;
    const isSelected = G.selectedShipId === ship.id;
    const isEnemy  = !isOwn;

    // Custom setup: any ship is clickable to remove it
    if (G.customPhase && (G.customPhase.endsWith('_SHIPS') || G.customPhase === 'MID')) {
      wrap.insertAdjacentHTML('afterbegin', shipImgHTML(ship.color, ship.size, ship.owner, {}));
      _stampPid(wrap);
      wrap.style.cursor = 'pointer';
      wrap.title = 'Click to remove';
      wrap.onmouseover = () => wrap.style.filter = 'drop-shadow(0 0 8px rgba(255,80,80,0.8))';
      wrap.onmouseout  = () => wrap.style.filter = '';
      wrap.onclick = (e) => {
        e.stopPropagation();
        G.bank[ship.color][ship.size]++;
        sys.ships = sys.ships.filter(s => s.id !== ship.id);
        render();
      };
      return wrap;
    }

    if (isOwn)      wrap.classList.add('own-ship');
    if (isEnemy)    wrap.classList.add('enemy');
    if (isSelected) wrap.classList.add('selected');

    // ── MOVING state: clicking ANY ship in a valid destination → move there ──
    if (G.interaction === 'MOVING' && isMoveDest) {
      wrap.style.cursor = 'pointer';
      wrap.onclick = (e) => { e.stopPropagation(); onMoveTargetClick(sys.id); };
      wrap.innerHTML = shipImgHTML(ship.color, ship.size, ship.owner, { glow: false });
      
      _stampPid(wrap);
    return wrap;
    }

    // ── ATTACKING mode: click enemy to capture ──
    if (G.interaction === 'ATTACKING' && isEnemy) {
      const largest = getLargestOwnShip(sys, G.currentPlayer);
      if (largest && ship.size <= largest.size) {
        wrap.classList.add('valid-attack');
        wrap.onclick = (e) => { e.stopPropagation(); onAttackTargetClick(ship.id); };
      }
      wrap.innerHTML = shipImgHTML(ship.color, ship.size, ship.owner, {});
      
      _stampPid(wrap);
    return wrap;
    }

    // ── RED SACRIFICE: enemy ships are directly clickable without selecting own ship first ──
    if (sacPool && G.sacrificePool.color === 'red' && isEnemy) {
      // Find largest own ship in THIS system to use as the attacker
      const largest = getLargestOwnShip(sys, G.currentPlayer);
      if (largest && ship.size <= largest.size && hasActionLeft('red')) {
        wrap.classList.add('valid-attack-direct');
        wrap.onclick = (e) => {
          e.stopPropagation();
          // Use largest own ship in this system as attacker
          saveHistory();
          logAction(Note.hijack(ship, sys.name));
          ship.owner = G.currentPlayer;
          consumeAction();
          G.interaction = 'IDLE';
          G.selectedShipId = null;
          render();
        };
        wrap.insertAdjacentHTML('afterbegin', shipImgHTML(ship.color, ship.size, ship.owner, {}));
        
        _stampPid(wrap);
    return wrap;
      }
    }

    // ── SHIP_SELECTED: shortcuts via clicking pieces in selected ship's system ──
    if (G.interaction === 'SHIP_SELECTED' && isSelSys && !isSelected) {
      if (isEnemy) {
        // Direct attack shortcut: click capturable enemy → attack immediately
        const hasPow = sacPool ? G.sacrificePool.color === 'red' : sysPowers.has('red');
        const largest = getLargestOwnShip(sys, G.currentPlayer);
        if (hasPow && hasActionLeft('red') && largest && ship.size <= largest.size) {
          wrap.classList.add('valid-attack-direct');
          wrap.onclick = (e) => { e.stopPropagation(); directAttack(ship, sys); };
          wrap.innerHTML = shipImgHTML(ship.color, ship.size, ship.owner, {});
          
          _stampPid(wrap);
    return wrap;
        }
      } else if (isOwn) {
        // Own ship in selected system: click to use its color as power, or re-select
        const hasPow = sacPool ? G.sacrificePool.color === ship.color : sysPowers.has(ship.color);
        if (hasPow && hasActionLeft(ship.color)) {
          // This ship's color provides a usable action — treat as power trigger
          wrap.classList.add('piece-power');
          wrap.dataset.color = ship.color;
          const POWER_LABEL = { yellow:'MOVE', blue:'TRADE', green:'BUILD', red:'HIJACK' };
          const tip = document.createElement('span');
          tip.className = 'power-tip';
          tip.textContent = POWER_LABEL[ship.color] || ship.color.toUpperCase();
          wrap.appendChild(tip);
          wrap.onclick = (e) => { e.stopPropagation(); onPowerClick(ship.color, sys); };
        } else {
          // No valid action for this color — re-select to this ship
          wrap.onclick = (e) => { e.stopPropagation(); onShipClick(ship.id); };
        }
        wrap.innerHTML = shipImgHTML(ship.color, ship.size, ship.owner, {}) + wrap.innerHTML;
        
        _stampPid(wrap);
    return wrap;
      }
    }

    // ── SETUP ──
    if (G.phase === 'SETUP' && G.setupDone && sys.isHomeworld === G.currentPlayer && isOwn) {
      wrap.style.cursor = 'pointer';
      wrap.onmouseenter = () => wrap.style.filter = 'drop-shadow(0 0 8px rgba(255,80,80,0.9))';
      wrap.onmouseleave = () => wrap.style.filter = '';
      wrap.onclick = () => restartSetup();
    } else if (isOwn) {
      // IDLE / default: select this ship
      if (G.phase === 'PLAY') {
        if (isSelectableShip(ship, sys)) wrap.classList.add('selectable');
      }
      // If this IS the selected ship, clicking it triggers its own color as a power
      if (isSelected && G.interaction === 'SHIP_SELECTED') {
        const hasPow = sacPool ? G.sacrificePool.color === ship.color : sysPowers.has(ship.color);
        if (hasPow && hasActionLeft(ship.color)) {
          wrap.classList.add('piece-power');
          wrap.dataset.color = ship.color;
          const POWER_LABEL = { yellow:'MOVE', blue:'TRADE', green:'BUILD', red:'HIJACK' };
          const tip = document.createElement('span');
          tip.className = 'power-tip';
          tip.textContent = POWER_LABEL[ship.color] || ship.color.toUpperCase();
          wrap.appendChild(tip);
          wrap.onclick = (e) => { e.stopPropagation(); onPowerClick(ship.color, sys); };
        } else {
          // No power available for this color — click does nothing (deselect via board bg)
          wrap.onclick = (e) => { e.stopPropagation(); };
        }
      } else {
        wrap.onclick = (e) => { e.stopPropagation(); onShipClick(ship.id); };
      }
    }

    // Insert image FIRST so any previously appended children (power-tip) are not overwritten
    wrap.insertAdjacentHTML('afterbegin', shipImgHTML(ship.color, ship.size, ship.owner, { glow: isSelected }));
    
    _stampPid(wrap);
    return wrap;
  }

  // ▽ down ships on LEFT
  downShips.forEach(ship => row.appendChild(makeShipWrap(ship)));

  // Stars in centre — with power-click shortcuts when ship is selected
  sys.stars.forEach((star, starIdx) => {
    const isSetupOwnHW = G.phase === 'SETUP' && G.setupDone && sys.isHomeworld === G.currentPlayer;
    const wrap = document.createElement('div');
    wrap.style.flexShrink = '0';

    if (isSetupOwnHW) {
      wrap.style.cursor = 'pointer';
      wrap.title = `Remove ${star.color} size-${star.size} star`;
      wrap.innerHTML = starImgHTML(star.color, star.size);
      wrap.dataset.animKey = 'star:' + sys.id + ':' + star.color + ':' + star.size + ':' + starIdx;
      wrap.onmouseenter = () => wrap.style.filter = 'drop-shadow(0 0 8px rgba(255,80,80,0.9))';
      wrap.onmouseleave = () => wrap.style.filter = '';
      wrap.onclick = () => restartSetup();
    } else {
      wrap.innerHTML = starImgHTML(star.color, star.size);
      _stampPid(wrap);
      wrap.dataset.animKey = 'star:' + sys.id + ':' + star.color + ':' + star.size + ':' + starIdx;

      // Shortcut: clicking a star in selected ship's system triggers that color's action
      if (G.interaction === 'SHIP_SELECTED' && isSelSys) {
        const hasPow = sacPool ? G.sacrificePool.color === star.color : sysPowers.has(star.color);
        if (hasPow && hasActionLeft(star.color)) {
          wrap.classList.add('piece-power');
          wrap.dataset.color = star.color;
          const POWER_LABEL = { yellow:'MOVE', blue:'TRADE', green:'BUILD', red:'HIJACK' };
          const tip = document.createElement('span');
          tip.className = 'power-tip';
          tip.textContent = POWER_LABEL[star.color] || star.color.toUpperCase();
          wrap.appendChild(tip);
          wrap.onclick = (e) => { e.stopPropagation(); onPowerClick(star.color, sys); };
        }
      }

      // Shortcut: clicking a star in a valid move-destination system also moves there
      if (G.interaction === 'MOVING' && isMoveDest) {
        wrap.style.cursor = 'pointer';
        wrap.onclick = (e) => { e.stopPropagation(); onMoveTargetClick(sys.id); };
      }
    }
    row.appendChild(wrap);
  });

  // △ up ships on RIGHT
  upShips.forEach(ship => row.appendChild(makeShipWrap(ship)));

  card.appendChild(row);

  return card;
}

    const hw1 = G.systems.find(s => s.isHomeworld === 1);

        if (hw2) zP2.appendChild(makeCustomWrapper(hw2));
        zP2.appendChild(makeSetupToken(2));
      } else if (p === 'MID') {
        if (hw1) zP1.appendChild(makeCustomWrapper(hw1));

        // Mid systems with + buttons
        const midSystems = G.systems.filter(s => !s.isHomeworld);
        if (midSystems.length > 0) {
          const row = document.createElement('div');
          row.className = 'dist-row';
          row.style.flexWrap = 'wrap';
          midSystems.forEach(s => row.appendChild(makeCustomWrapper(s)));
          zMid.appendChild(row);
        }
      }
      _initArrows(); requestAnimationFrame(_renderArrows);
      return; // skip normal board rendering
    }
    // ── End custom setup ─────────────────────────────────────

    if (hw2) {
    zP2.appendChild(renderSystem(hw2));
    if (_appMode === 'sandbox' && G.phase === 'PLAY' && G.currentPlayer === 2)
      zP2.appendChild(makeTurnToken(2));
    if (_appMode === 'sandbox' && G.phase === 'SETUP' && G.setupDone && G.currentPlayer === 2)
      zP2.appendChild(makeSetupToken(2));
  }
  if (hw1) {
    zP1.appendChild(renderSystem(hw1));
    if (_appMode === 'sandbox' && G.phase === 'PLAY' && G.currentPlayer === 1)
      zP1.appendChild(makeTurnToken(1));
    if (_appMode === 'sandbox' && G.phase === 'SETUP' && G.setupDone && G.currentPlayer === 1)
      zP1.appendChild(makeSetupToken(1));
  }
  if (_appMode === 'sandbox' && G.phase === 'SETUP' && !G.setupDone) {
    renderSetupPreview(G.currentPlayer === 1 ? zP1 : zP2);
  }

  const midSystems = G.systems.filter(s => !s.isHomeworld);
  console.log('[renderBoard] midSystems:', midSystems.length); // delete this
  if (!midSystems.length) { console.log('[renderBoard] returning early — no mid systems'); return; } // delete this and replace with >> if (!midSystems.length) return;

  const d2map = bfsDistances(hw2);
  const d1map = bfsDistances(hw1);
  const INF = 999;
  midSystems.sort((a, b) => {
    const da2 = d2map.get(a.id)??INF, db2 = d2map.get(b.id)??INF;
    const da1 = d1map.get(a.id)??INF, db1 = d1map.get(b.id)??INF;
    if (da2 !== db2) return da2 - db2;
    return db1 - da1;
  });
  const layers = new Map();
  midSystems.forEach(s => {
    const d = d2map.get(s.id)??INF;
    if (!layers.has(d)) layers.set(d, []);
    layers.get(d).push(s);
  });
  [...layers.keys()].sort((a,b) => a-b).forEach(d => {
    const row = document.createElement('div');
    row.className = 'dist-row';
    layers.get(d).forEach(s => row.appendChild(renderSystem(s)));
    zMid.appendChild(row);
  });

  _initArrows();
  requestAnimationFrame(_renderArrows);
}

function doEndTurn() {
  if (G.phase === 'SETUP' && G.setupDone) {
    const p = G.currentPlayer;
    commitTurnLog();
    G.setupDone = false;
    G.history = null;
    // firstMover: who sets up first AND takes first turn in play phase (default: 1)
    const firstSetup  = G.firstMover || 1;
    const secondSetup = 3 - firstSetup;
    if (p === firstSetup) {
      // First player done with setup — second player now sets up
      G.currentPlayer = secondSetup;
      //showPassBanner(`PLAYER ${secondSetup} — SETUP`, 'Choose your homeworld stars and ship');
    } else {
      // Second player done — start play phase; firstMover goes first
      G.phase = 'PLAY';
      G.currentPlayer = firstSetup;
      //showPassBanner(`PLAYER ${firstSetup}'S TURN`, 'The game begins — good luck!');
    }
    render();
    return;
  }
  if (G.phase !== 'PLAY') return;
  if (!G.turnUsed && G.sacrificePool.count === 0 && (!G._pendingActions || G._pendingActions.length === 0)) {
    logAction(Note.skip());
  }
  commitTurnLog();

  // Timer adjustments on end turn
  const prevPlayer = G.currentPlayer;

  G.currentPlayer = G.currentPlayer === 1 ? 2 : 1;
  G.turnUsed = false;
  G.sacrificePool = { color: null, count: 0 };
  G.selectedShipId = null;
  G.movingFromSysId = null;
  G.interaction = 'IDLE';
  G.history = null;
  G._turnStart = null; // clear before snapshot to prevent exponential nesting
  G._turnStart = JSON.stringify(G);
  if (!checkWin()) render();
}

function attachTurnTokenListeners(tokenEl) {
  tokenEl.addEventListener('click', () => {
    if (tokenEl.classList.contains('disabled')) return;
    if (_puzzleMeta) puzzleEndTurn(); else if (G.customPhase) doCustomEndTurn(); else doEndTurn();

  });
  tokenEl.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (tokenEl.classList.contains('disabled')) return;
    if (_puzzleMeta) puzzleEndTurn(); else if (G.customPhase) doCustomEndTurn(); else doEndTurn();

  });
}


  function onBankClick(color, size) {
      // Custom setup: star selection for HWs or mid systems
      if (G.customPhase === 'HW1_STARS' || G.customPhase === 'HW2_STARS') {
        if (G.setupCache.stars.length >= 2 || G.bank[color][size] <= 0) return;
        G.bank[color][size]--;
        G.setupCache.stars.push({ color, size });
        render(); return;
      }
      if (G.customShipOwner && G.customShipSys) {
        if (G.bank[color][size] <= 0) return;
        const sys = findSystem(G.customShipSys);
        if (!sys) return;
        G.bank[color][size]--;
        sys.ships.push({ id: nextId(), color, size, owner: G.customShipOwner });
        // stay in ship-adding mode for this side (don't clear customShipOwner)
        render(); return;
      }
      if (G.customPhase === 'MID' && G.customMidAdding) {
        if (G.bank[color][size] <= 0) return;
        G.bank[color][size]--;
        const name = randomStarName();
        G.systems.push({ id: nextId(), name, isHomeworld: null, discoveredBy: null,
          stars: [{ color, size }], ships: [] });
        G.customMidAdding = false;
        render(); return;
      }
      if (G.phase === 'SETUP' && !G.setupDone) {
      if (G.setupStep < 2) {
        G.bank[color][size]--;
        G.setupCache.stars.push({ color, size });
        G.setupStep++;
        render();
      } else if (G.setupStep === 2 && size === 3) {
        finalizeSetup(color);
      }
    } else if (G.interaction === 'DISCOVERING' || G.interaction === 'MOVING') {
      doDiscover(color, size);
    } else if (G.interaction === 'BUILDING') {
      const sys = findSystemByShip(G.selectedShipId);
      if (sys) doBuild(sys, color);
    } else if (G.interaction === 'TRADING') {
      const ship = findShip(G.selectedShipId);
      if (ship) doTrade(ship, color);
    }
  }

  function finalizeSetup(shipColor) {
    G.bank[shipColor][3]--;
    const p = G.currentPlayer;
    const stars = G.setupCache.stars;
    const ship = { color: shipColor, size: 3 };
    const sysName = p === 1 ? 'Nexus' : 'Vertex';
    const notation = Note.homeworld(stars[0], stars[1], ship, sysName);
    G.systems.push({
      id: nextId(), name: sysName, isHomeworld: p,
      stars: [...G.setupCache.stars],
      ships: [{ id: nextId(), color: shipColor, size: 3, owner: p }]
    });
    // Stage as pending — will be committed when player clicks End Turn
    G._pendingActions = [notation];
    G.setupCache = { stars: [] };
    G.setupStep = 0;
    G.setupDone = true;
    render();
  }

  function restartSetup() {
    // If homeworld was already finalized, undo it
    if (G.setupDone) {
      const hw = G.systems.find(s => s.isHomeworld === G.currentPlayer);
      if (hw) {
        hw.stars.forEach(s => G.bank[s.color][s.size]++);
        hw.ships.forEach(s => G.bank[s.color][s.size]++);
        G.systems = G.systems.filter(s => s.isHomeworld !== G.currentPlayer);
      }
      G.setupDone = false;
    }
    // Return any partially-picked stars
    G.setupCache.stars.forEach(s => G.bank[s.color][s.size]++);
    G.setupCache = { stars: [] };
    G.setupStep = 0;
    G._pendingActions = [];  // clear any staged log entry
    window._animSkipSetupPreview = true;
    render();
  }

  // Smart per-piece removal from the finalized homeworld preview.
  // Clicking the ship only removes the ship; clicking a star removes that star
  // and all subsequent pieces (ship too), since placement is ordered.
  function removeSetupPiece(type, starIndex) {
    if (!G.setupDone) return; // shouldn't happen, but guard
    const hw = G.systems.find(s => s.isHomeworld === G.currentPlayer);
    if (!hw) { restartSetup(); return; }

    // Always return the ship
    const ship = hw.ships.find(s => s.owner === G.currentPlayer);

    if (type === 'ship') {
      // Remove ship only — keep both stars placed
      if (ship) G.bank[ship.color][ship.size]++;
      // Rebuild from the placed stars — move them back to setupCache
      G.setupCache.stars = hw.stars.map(s => ({ color: s.color, size: s.size }));
      G.setupStep = 2;
      G.setupDone = false;
      G.systems = G.systems.filter(s => s.isHomeworld !== G.currentPlayer);
    } else {
      // type === 'star' at index starIndex
      // Return ship + all stars from starIndex onwards
      if (ship) G.bank[ship.color][ship.size]++;
      for (let i = starIndex; i < hw.stars.length; i++) {
        G.bank[hw.stars[i].color][hw.stars[i].size]++;
      }
      G.setupCache.stars = hw.stars.slice(0, starIndex).map(s => ({ color: s.color, size: s.size }));
      G.setupStep = starIndex;
      G.setupDone = false;
      G.systems = G.systems.filter(s => s.isHomeworld !== G.currentPlayer);
    }
    G._pendingActions = [];
    window._animSkipSetupPreview = true;
    render();
  }

// ============================================================
//  PLAY ACTIONS
// ============================================================
function onShipClick(shipId) {
  const ship = findShip(shipId);
  if (!ship) return;

  // MOVING: clicking any ship in a valid destination system → move there
  if (G.interaction === 'MOVING') {
    const clickedSys = findSystemByShip(shipId);
    const fromSys    = findSystemByShip(G.selectedShipId);
    if (clickedSys && fromSys && clickedSys.id !== fromSys.id && isConnected(fromSys, clickedSys)) {
      onMoveTargetClick(clickedSys.id);
    }
    return;
  }

  if (ship.owner !== G.currentPlayer) return;
  const clickedSys = findSystemByShip(shipId);

  // ── SACRIFICE POOL: clicking own ship immediately applies the sacrificed action ──
  if (G.sacrificePool.count > 0 && G.interaction === 'IDLE') {
    const sc = G.sacrificePool.color;
    G.selectedShipId = shipId; // set so actions know which ship

    if (sc === 'blue') {
      // Trade: go straight to TRADING state for this ship
      const avail = COLORS.filter(col => col !== ship.color && G.bank[col][ship.size] > 0);
      if (avail.length === 0) { setGuide('⚠ No other colors available to trade into.'); G.selectedShipId = null; return; }
      G.interaction = 'TRADING';
      render();
      return;
    }

    if (sc === 'yellow') {
      // Move: go straight to MOVING state for this ship
      const isLastInHW = clickedSys && clickedSys.isHomeworld === G.currentPlayer &&
        clickedSys.ships.filter(s => s.owner === G.currentPlayer).length <= 1;
      if (isLastInHW) { setGuide('⚠ Cannot move your last ship away from your Homeworld.'); G.selectedShipId = null; return; }
      G.interaction = 'MOVING';
      G.movingFromSysId = clickedSys ? clickedSys.id : null;
      render();
      return;
    }

    if (sc === 'green' && clickedSys) {
      // Build: use the CLICKED ship's color directly (no picker needed)
      const targetColor = ship.color;
      const smallestSz  = [1,2,3].find(sz => G.bank[targetColor][sz] > 0);
      if (!smallestSz) {
        setGuide(`⚠ Bank has no ${targetColor} pieces left.`);
        G.selectedShipId = null;
        return;
      }
      G.interaction = 'SHIP_SELECTED'; // doBuild requires non-IDLE
      doBuild(clickedSys, targetColor);
      return;
    }

    // Fallback: go to SHIP_SELECTED so player can pick manually
    G.interaction = 'SHIP_SELECTED';
    render();
    return;
  }

  // ── Normal flow (no sacrifice pool) ──
  // Already have a ship selected
  if (G.interaction === 'SHIP_SELECTED' && G.selectedShipId) {
    const selSys = findSystemByShip(G.selectedShipId);

    if (selSys && clickedSys && selSys.id === clickedSys.id) {
      // Same system → trigger this ship's color as a power
      onPowerClick(ship.color, clickedSys);
      return;
    } else {
      // Different system → re-select that ship
      G.selectedShipId = shipId;
      G.movingFromSysId = null;
      render();
      return;
    }
  }

  // IDLE → select this ship
  G.interaction = 'SHIP_SELECTED';
  G.selectedShipId = shipId;
  G.movingFromSysId = null;
  render();
}

function onAttackTargetClick(targetShipId) {
  if (G.interaction !== 'ATTACKING') return;
  const sys = findSystemByShip(targetShipId);
  const target = findShip(targetShipId);
  if (!sys || !target) return;
  if (target.owner === G.currentPlayer) return;
  const largest = getLargestOwnShip(sys, G.currentPlayer);
  if (!largest || largest.size < target.size) {
    setGuide(`⚠ Cannot capture: your largest ship (Size ${largest?.size ?? '?'}) must be ≥ enemy size (${target.size}).`);
    return;
  }
  saveHistory();
  logAction(Note.hijack(target, sys.name));
  target.owner = G.currentPlayer;
  consumeAction();
  G.interaction = 'IDLE';
  G.selectedShipId = null;
  render();
}

function onMoveTargetClick(sysId) {
  if (G.interaction !== 'MOVING') return;
  const ship = findShip(G.selectedShipId);
  const fromSys = findSystemByShip(G.selectedShipId);
  const toSys = findSystem(sysId);
  if (!ship || !fromSys || !toSys) return;
  if (!isConnected(fromSys, toSys)) return;
  // Guard: block if would leave own homeworld with no ships
  const isLastInHW = fromSys.isHomeworld === G.currentPlayer &&
    fromSys.ships.filter(s => s.owner === G.currentPlayer).length <= 1;
  if (isLastInHW) {
    setGuide('⚠ Cannot move your last ship away from your Homeworld — you would lose!');
    return;
  }
  saveHistory();
  logAction(Note.move(ship, fromSys.name, toSys.name));
  fromSys.ships = fromSys.ships.filter(s => s.id !== ship.id);
  toSys.ships.push(ship);
  consumeAction();
  cleanSystems();
  G.selectedShipId = null;
  G.movingFromSysId = null;
  G.interaction = 'IDLE';
  render();
}

// ---- START ACTION MODES ----
function startTrade(ship, sys) {
  const availColors = COLORS.filter(c => c !== ship.color && G.bank[c][ship.size] > 0);
  if (availColors.length === 0) { alert('No other colors available in the stash!'); return; }
  G.interaction = 'TRADING';
  render();
}

function startMove(ship, sys) {
  // Block if this is the player's last ship in their homeworld
  const isLastInHW = sys.isHomeworld === G.currentPlayer &&
    sys.ships.filter(s => s.owner === G.currentPlayer).length <= 1;
  if (isLastInHW) {
    setGuide('⚠ Cannot move your last ship away from your Homeworld — you would lose!');
    return;
  }
  G.interaction = 'MOVING';
  G.movingFromSysId = sys.id;
  render();
}

function startAttack(ship, sys) {
  // Per spec: use the LARGEST own ship in the system for size comparison
  const largest = getLargestOwnShip(sys, G.currentPlayer);
  if (!largest) return;
  const enemies = sys.ships.filter(s => s.owner !== G.currentPlayer && s.size <= largest.size);
  if (enemies.length === 0) {
    const allEnemies = sys.ships.filter(s => s.owner !== G.currentPlayer);
    if (allEnemies.length === 0) setGuide('⚠ No enemy ships in this system.');
    else setGuide(`⚠ Cannot hijack: your largest ship here is Size ${largest.size}, but all enemies are larger.`);
    return;
  }
  G.interaction = 'ATTACKING';
  render();
}

function startBuild(ship, sys) {
  // Build the selected ship's OWN color directly
  const targetColor = ship.color;
  const smallestSz  = [1,2,3].find(sz => G.bank[targetColor][sz] > 0);
  if (!smallestSz) {
    setGuide(`⚠ Cannot build: bank has no ${targetColor} pieces left.`);
    return;
  }
  G.interaction = 'SHIP_SELECTED'; // ensure doBuild guard passes
  doBuild(sys, targetColor);
}

// ---- EXECUTE ACTIONS ----
function doTrade(ship, newColor) {
  if (G.interaction !== 'TRADING' && G.interaction !== 'SHIP_SELECTED') return;
  G.interaction = 'IDLE';
  saveHistory();
  const sys = findSystemByShip(ship.id);
  logAction(Note.trade(ship, sys?.name ?? '?', newColor));
  G.bank[ship.color][ship.size]++;
  G.bank[newColor][ship.size]--;
  ship.color = newColor;
  consumeAction();
  G.interaction = 'IDLE';
  G.selectedShipId = null;
  render();
}

function doBuild(sys, color) {
  if (G.interaction !== 'BUILDING' && G.interaction !== 'SHIP_SELECTED') return;
  const sz = [1,2,3].find(s => G.bank[color][s] > 0);
  if (!sz) { alert('Bank empty for this color!'); return; }
  G.interaction = 'IDLE'; // set immediately before any async/render
  saveHistory();
  G.bank[color][sz]--;
  const newShip = { id: nextId(), color, size: sz, owner: G.currentPlayer };
  sys.ships.push(newShip);
  logAction(Note.build(newShip, sys.name));
  consumeAction();
  G.interaction = 'IDLE';
  G.selectedShipId = null;
  render();
}

function doDiscover(starColor, starSize) {
  const ship = findShip(G.selectedShipId);
  const fromSys = findSystemByShip(G.selectedShipId);
  if (!ship || !fromSys) return;
  // Block if last own ship in homeworld
  const isLastInHW = fromSys.isHomeworld === G.currentPlayer &&
    fromSys.ships.filter(s => s.owner === G.currentPlayer).length <= 1;
  if (isLastInHW) {
    setGuide('⚠ Cannot move your last ship away from your Homeworld — you would lose!');
    G.interaction = 'SHIP_SELECTED';
    render();
    return;
  }
  // Verify the new star size doesn't overlap with fromSys (connectivity)
  const taken = systemSizes(fromSys);
  if (taken.has(starSize)) { setGuide('⚠ Star size overlaps with origin — systems would not be connected!'); return; }
  saveHistory();
  G.bank[starColor][starSize]--;
  const newName = randomStarName();
  const newSys = {
    id: nextId(),
    name: newName,
    isHomeworld: null,
    discoveredBy: G.currentPlayer,  // used for row placement
    stars: [{ color: starColor, size: starSize }],
    ships: []
  };
  logAction(Note.discover(ship, fromSys.name, starColor, starSize, newName));
  fromSys.ships = fromSys.ships.filter(s => s.id !== ship.id);
  newSys.ships.push(ship);
  G.systems.push(newSys);
  consumeAction();
  cleanSystems();
  G.selectedShipId = null;
  G.movingFromSysId = null;
  G.interaction = 'IDLE';
  render();
}

function doSacrifice(ship, sys) {
  const isOnlyShipInHW = sys.isHomeworld === G.currentPlayer && sys.ships.filter(s => s.owner === G.currentPlayer).length === 1;
  if (isOnlyShipInHW) { alert('Cannot sacrifice your only ship in your homeworld!'); return; }
  if (G.turnUsed) { alert('Already used your action this turn!'); return; }
  saveHistory();
  logAction(Note.sacrifice(ship, sys.name));
  G.bank[ship.color][ship.size]++;
  sys.ships = sys.ships.filter(s => s.id !== ship.id);
  G.sacrificePool = { color: ship.color, count: ship.size };
  G.turnUsed = true;
  G.selectedShipId = null;
  G.interaction = 'IDLE';
  cleanSystems();
  render();
}

function makeCustomWrapper(sys) {

    const editBtn = document.createElement('button');
    editBtn.style.cssText = 'font-size:10px;letter-spacing:1px;padding:3px 8px;background:transparent;border:1px solid #2a3850;color:#3a5070;font-family:Share Tech Mono,monospace;cursor:pointer;border-radius:3px;transition:all .15s';

    editBtn.onmouseout  = () => { editBtn.style.color='#3a5070'; editBtn.style.borderColor='#2a3850'; };
    editBtn.onclick = (e) => {
      e.stopPropagation();
      // Put existing stars into setupCache so user sees them and can click to remove
      G.setupCache = { stars: sys.stars.map(s => ({ color: s.color, size: s.size })) };
      sys.stars.forEach(s => G.bank[s.color][s.size]++);
      sys.stars = []; // cleared — will be repopulated on confirm
      G.setupStep = G.setupCache.stars.length;
      G.customShipOwner = null; G.customShipSys = null;
      G.customEditingHW = sys.id; // remember which system we're editing
      G.customPhase = sys.isHomeworld === 1 ? 'HW1_STARS' : 'HW2_STARS';
      G.currentPlayer = sys.isHomeworld;
      render();
    };
    sysCol.appendChild(editBtn);
  }
  // Remove button only for mid systems (not homeworlds)
  if (!sys.isHomeworld) {
    const removeBtn = document.createElement('button');
    removeBtn.style.cssText = 'font-size:10px;letter-spacing:1px;padding:3px 8px;background:transparent;border:1px solid #3a1a22;color:#5a3040;font-family:Share Tech Mono,monospace;cursor:pointer;border-radius:3px;transition:all .15s';

    removeBtn.onmouseout  = () => { removeBtn.style.color='#5a3040'; removeBtn.style.borderColor='#3a1a22'; };

      e.stopPropagation();
      // Return pieces to bank
      sys.stars.forEach(s => G.bank[s.color][s.size]++);
      sys.ships.forEach(s => G.bank[s.color][s.size]++);
      G.systems = G.systems.filter(x => x.id !== sys.id);
      if (G.customShipSys === sys.id) { G.customShipOwner = null; G.customShipSys = null; }
      render();
    };
    sysCol.appendChild(removeBtn);
  }
  wrapper.appendChild(sysCol);
  wrapper.appendChild(makeBtn(1));       // right = P1 ships △
  return wrapper;
}

function doCustomEndTurn() {
  switch (G.customPhase) {
    case 'HW1_STARS': {
      if (G.setupCache.stars.length === 0) return;
      if (G.customEditingHW) {
        const existing = findSystem(G.customEditingHW);
        if (existing) existing.stars = [...G.setupCache.stars];
        G.customEditingHW = null;
        G.setupCache = { stars: [] }; G.setupStep = 0;
        G.customPhase = 'MID'; render(); break;
      }
      const hw1sys = { id: nextId(), name: 'Nexus', isHomeworld: 1, stars: [...G.setupCache.stars], ships: [] };
      G.systems.push(hw1sys);
      G.setupCache = { stars: [] }; G.setupStep = 0;
      G.customPhase = 'HW1_SHIPS';
      G.customShipOwner = 1; G.customShipSys = hw1sys.id; // auto-select P1 right side
      render(); break;
    }
    case 'HW1_SHIPS': {
      G.customShipOwner = null; G.customShipSys = null;
      G.customPhase = 'HW2_STARS'; G.currentPlayer = 2; render(); break;
    }
    case 'HW2_STARS': {
      if (G.setupCache.stars.length === 0) return;
      if (G.customEditingHW) {
        const existing = findSystem(G.customEditingHW);
        if (existing) existing.stars = [...G.setupCache.stars];
        G.customEditingHW = null;
        G.setupCache = { stars: [] }; G.setupStep = 0;
        G.customPhase = 'MID'; render(); break;
      }
      const hw2sys = { id: nextId(), name: 'Vertex', isHomeworld: 2, stars: [...G.setupCache.stars], ships: [] };
      G.systems.push(hw2sys);
      G.setupCache = { stars: [] }; G.setupStep = 0;
      G.customPhase = 'HW2_SHIPS';
      G.customShipOwner = 2; G.customShipSys = hw2sys.id; // auto-select P2 left side
      render(); break;
    }
    case 'HW2_SHIPS': {
      G.customShipOwner = null; G.customShipSys = null;
      G.customPhase = 'MID'; G.customMidAdding = false; render(); break;
    }
  }
}

  document.getElementById('pp-p1').style.borderColor = p===1 ? '#2266ff' : '#2a3850';

};
window.submitPuzzle = async function() {
  const goalMoves = parseInt(document.getElementById('pp-goal').value) || 3;
  const puzzleData = {
    puzzlePlayer: _publishPuzzlePlayer,
    goalMoves,
    name: document.getElementById('pp-name').value.trim() || 'Untitled Puzzle',
    systems: JSON.parse(JSON.stringify(G.systems)),
    bank: JSON.parse(JSON.stringify(G.bank)),
    createdAt: Date.now(),
    createdBy: '', // filled below
    createdByName: 'Pilot',
  };
  try {
    // Reuse the already-authenticated Firebase instance from _puzzleMeta if in puzzle mode,
    // otherwise use the module-level db/auth from the page's existing Firebase init
    const _fbApp = initializeApp(firebaseConfig);
    const _db = getDatabase(_fbApp);
    const _auth = getAuth(_fbApp);
    // Wait for auth to restore — currentUser is null until onAuthStateChanged fires
    const user = await new Promise(res => {
      const unsub = onAuthStateChanged(_auth, u => { unsub(); res(u); });
    });
    if (user) {
      puzzleData.createdBy = user.uid;
      const playerSnap = await get(ref(_db, 'players/' + user.uid));
      puzzleData.createdByName = playerSnap.val()?.name || user.displayName || 'Pilot';
    }
    const puzzleRef = await push(ref(_db, 'puzzles'), puzzleData);
    document.getElementById('publish-puzzle-overlay').style.display = 'none';
    alert('Puzzle published! ID: ' + puzzleRef.key);
  } catch(e) { alert('Failed to publish: ' + e.message); }
};

        ? 'Homeworld set! Click the ✓ token on your homeworld to continue.'
        : 'Homeworld set! Click the ✓ token on your homeworld to begin the game.';
      const resetBtn = document.createElement('button');
      resetBtn.className = 'action-btn';
      resetBtn.textContent = '↩ RESTART SELECTION';
      resetBtn.onclick = restartSetup;
      actionBtns.appendChild(resetBtn);
    } else {
      const stepLabels = [
        'Click any star in the STASH to choose your 1st homeworld star.',
        'Click any star in the STASH to choose your 2nd homeworld star.',
        'Click a Large (size 3) ship in the STASH to choose your starting ship.'
      ];
      guideEl.textContent = stepLabels[G.setupStep];

      if (G.setupCache.stars.length > 0) {
        const resetBtn = document.createElement('button');
        resetBtn.className = 'action-btn';
        resetBtn.style.marginTop = '4px';
        resetBtn.textContent = '↩ RESTART SELECTION';
        resetBtn.onclick = restartSetup;
        actionBtns.appendChild(resetBtn);
      }
    }
    return;
  }

  // ---- PLAY PHASE ----
  const isMyActiveTurn = !window._ONLINE?.active || G.currentPlayer === (window._ONLINE?.mySlot || G.currentPlayer);
  if (isMyActiveTurn) {
    titleEl.textContent = 'YOUR TURN';
  } else {
    titleEl.textContent = `${(PLAYER_CONFIG.names[G.currentPlayer]||'OPPONENT').toUpperCase()}'S TURN`;
  }

  // Catastrophe alerts — always check, shown at top of action panel
  renderCatastrophePanel();

  // Sacrifice pool counter
  if (G.sacrificePool.count > 0) {
    sacCounter.style.display = 'block';
    const _sacColor = G.sacrificePool.color;
    const _sacPower = {red:'Hijack',blue:'Trade',yellow:'Move',green:'Build'}[_sacColor] || _sacColor;
    const _sacHex   = {red:'#ff5566',blue:'#4488ff',yellow:'#ffcc00',green:'#22dd77'}[_sacColor] || '#aaa';
    sacCounter.innerHTML = `<span style="color:${_sacHex};font-weight:bold;letter-spacing:1px">${G.sacrificePool.count} ${_sacPower} action${G.sacrificePool.count !== 1 ? 's' : ''} left</span>`;
  }


  const midAction = ['SHIP_SELECTED','MOVING','DISCOVERING','TRADING','ATTACKING','BUILDING'].includes(G.interaction)
                    || G.sacrificePool.count > 0;
  const hasDoneAction = G.turnUsed || (G._pendingActions && G._pendingActions.length > 0);

  if (midAction) {
    // token handles disabled state
  } else if (!hasDoneAction) {
      } else {
    }

  // Interaction state guide
  const adv = PLAYER_CONFIG.advancedMode;
  const guides = {
    IDLE:          'Select one of your ships.',
    SHIP_SELECTED: adv ? 'Click a colored star or ship to act. Click board to deselect.' : 'Choose an action — or click a star/ship of that color to act directly.',
    MOVING:        'Click a destination system or a stash star to discover.',
    DISCOVERING:   'Click a star in the Stash to create a new system.',
    TRADING:       'Choose the new color for your ship.',
    ATTACKING:     'Click a highlighted enemy ship to hijack it.',
    BUILDING:      'Choose the color of the ship to build.',
  };
  guideEl.textContent = guides[G.interaction] || '';

  if (G.interaction === 'IDLE' || G.interaction === 'SHIP_SELECTED') {
    if (G.interaction === 'SHIP_SELECTED') {
      const ship = findShip(G.selectedShipId);
      const sys = findSystemByShip(G.selectedShipId);
      if (!ship || !sys) { G.interaction = 'IDLE'; return render(); }

      const powers = getSystemPowers(sys, G.currentPlayer);
      const sacPool = G.sacrificePool.count > 0;

      // ── Action buttons ──────────────────────────────────────────────────────
      const ACTION_ICONS = {
        blue:   '/assets/actionIcons/iconb.webp',
        yellow: '/assets/actionIcons/icony.webp',
        red:    '/assets/actionIcons/iconr.webp',
        green:  '/assets/actionIcons/icong.webp',
        sac:    '/assets/actionIcons/iconp.webp',
      };

      /**
       * actionName = default label e.g. "TRADE"
       * warnText   = short warning that REPLACES label when disabled  e.g. "Stash empty"
       *              if null and disabled, button is just grayed out with no warning text
       */
      const makeActionBtn = (actionName, color, action, canAct, warnText = null) => {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        const hex = COLOR_HEX[color];

        if (canAct && hex) {
          btn.style.borderColor = hex;
          btn.style.color       = hex;
          btn.style.background  = `${hex}10`;
        } else if (!canAct && warnText) {
          btn.style.borderColor = 'rgba(28,40,64,0.5)';
          btn.style.color       = '#cc5544';
        } else {
          btn.style.borderColor = 'rgba(28,40,64,0.5)';
          btn.style.opacity     = '0.28';
        }

        // Icon
        const iconSrc = ACTION_ICONS[color];
        if (iconSrc) {
          const img = document.createElement('img');
          img.src = iconSrc; img.className = 'action-icon';
          img.width = 18; img.height = 18; img.draggable = false;
          btn.appendChild(img);
        }

        // Label — becomes the warning when disabled with a reason
        const lblEl = document.createElement('span');
        lblEl.className = 'abl';
        if (!canAct && warnText) {
          lblEl.textContent = warnText;
          lblEl.classList.add('is-warn');
        } else {
          lblEl.textContent = actionName;
        }
        btn.appendChild(lblEl);

        btn.disabled = !canAct;
        btn.onclick  = action;
        actionBtns.appendChild(btn);
      };

      // ── Per-action availability + granular disable reason ────────────────
      const isLastInHW = sys.isHomeworld === G.currentPlayer &&
        sys.ships.filter(s => s.owner === G.currentPlayer).length <= 1;
      const enemyShips = sys.ships.filter(s => s.owner !== G.currentPlayer);
      const largest    = getLargestOwnShip(sys, G.currentPlayer);
      const capturable = enemyShips.filter(s => largest && s.size <= largest.size);

      const hasPow = c => sacPool ? G.sacrificePool.color === c : powers.has(c);
      const actionOk = c => hasPow(c) && hasActionLeft(c);

      // Trade
      const trdStashOk = COLORS.some(c => c !== ship.color && G.bank[c][ship.size] > 0);
      const trdWarn = !hasPow('blue') ? null
        : !hasActionLeft('blue') ? 'Turn done'
        : !trdStashOk ? 'Stash empty' : null;
      const canTrdFull = actionOk('blue') && trdStashOk;

      // Move
      const movWarn = !hasPow('yellow') ? null
        : !hasActionLeft('yellow') ? 'Turn done'
        : isLastInHW ? 'Cannot abandon HW' : null;
      const canMovFull = actionOk('yellow') && !isLastInHW;

      // Hijack
      const atkWarn = !hasPow('red') ? null
        : !hasActionLeft('red') ? 'Turn done'
        : enemyShips.length === 0 ? 'No enemy'
        : capturable.length === 0 ? 'Enemy too big' : null;
      const canAtkFull = actionOk('red') && enemyShips.length > 0 && capturable.length > 0;

      // Build
      const bldStashOk = [1,2,3].some(sz => G.bank[ship.color][sz] > 0);
      const bldWarn = !hasPow('green') ? null
        : !hasActionLeft('green') ? 'Turn done'
        : !bldStashOk ? 'Stash empty' : null;
      const canBldFull = actionOk('green') && bldStashOk;

      // Keep compat vars used elsewhere (startBuild checks these)
      const canBld = (powers.has('green') || sacPool) && hasActionLeft('green');
      const canTrd = (powers.has('blue')  || sacPool) && hasActionLeft('blue');
      const canMov = (powers.has('yellow')|| sacPool) && hasActionLeft('yellow');
      const canAtk = (powers.has('red')   || sacPool) && hasActionLeft('red');
      const effectiveCanBld = sacPool ? (G.sacrificePool.color === 'green' && G.sacrificePool.count > 0) : canBld;
      const effectiveCanTrd = sacPool ? (G.sacrificePool.color === 'blue'  && G.sacrificePool.count > 0) : canTrd;
      const effectiveCanMov = sacPool ? (G.sacrificePool.color === 'yellow'&& G.sacrificePool.count > 0) : canMov;
      const effectiveCanAtk = sacPool ? (G.sacrificePool.color === 'red'   && G.sacrificePool.count > 0) : canAtk;

      if (!PLAYER_CONFIG.advancedMode) {
        makeActionBtn('TRADE',  'blue',   () => startTrade(ship, sys),  canTrdFull, trdWarn);
        makeActionBtn('MOVE',   'yellow', () => startMove(ship, sys),   canMovFull, movWarn);
        makeActionBtn('HIJACK', 'red',    () => startAttack(ship, sys), canAtkFull, atkWarn);
        makeActionBtn('BUILD',  'green',  () => startBuild(ship, sys),  canBldFull, bldWarn);
      }

      if (!sacPool) {
        const sep = document.createElement('div');
        sep.className = 'sep';
        actionBtns.appendChild(sep);

        // Sacrifice
        const isOnlyShipInHW = sys.isHomeworld === G.currentPlayer && sys.ships.filter(s => s.owner === G.currentPlayer).length === 1;
        const sacBtn = document.createElement('button');
        sacBtn.className = 'action-btn sac';
        const _sacDisabled = G.turnUsed || isOnlyShipInHW;
        sacBtn.disabled = _sacDisabled;
        // Determine label / warning
        const _sacWarnText = isOnlyShipInHW ? 'Only ship in HW'
          : G.turnUsed ? 'Turn done' : null;
        if (_sacDisabled && _sacWarnText) {
          sacBtn.style.color = '#cc5544'; sacBtn.style.borderColor = 'rgba(28,40,64,0.5)';
        } else if (_sacDisabled) {
          sacBtn.style.opacity = '0.28'; sacBtn.style.borderColor = 'rgba(28,40,64,0.5)';
        }
        // Icon
        const _sacImg = document.createElement('img');
        _sacImg.src = '/assets/actionIcons/iconp.webp'; _sacImg.className = 'action-icon';
        _sacImg.width = 18; _sacImg.height = 18; _sacImg.draggable = false;
        sacBtn.appendChild(_sacImg);
        // Label
        const _sacLbl = document.createElement('span'); _sacLbl.className = 'abl';
        if (_sacWarnText) { _sacLbl.textContent = _sacWarnText; _sacLbl.classList.add('is-warn'); }
        else { _sacLbl.textContent = 'SACRIFICE'; }
        sacBtn.appendChild(_sacLbl);
        sacBtn.onclick = () => doSacrifice(ship, sys);
        actionBtns.appendChild(sacBtn);
      }

      // (deselect by clicking board background)
    }
  } else if (G.interaction === 'MOVING') {
    // Show discover button + cancel
    const fromSys = findSystemByShip(G.selectedShipId);
    const discoverStars = bankStarsForDiscovery(fromSys);
    if (discoverStars.length > 0) {
      const discBtn = document.createElement('button');
      discBtn.className = 'action-btn';
      discBtn.style.borderColor = '#ffcc00';
      discBtn.textContent = '★ DISCOVER NEW SYSTEM';
      discBtn.onclick = () => { G.interaction = 'DISCOVERING'; render(); };
      actionBtns.appendChild(discBtn);
    }
    addCancelBtn(actionBtns);
  } else if (G.interaction === 'DISCOVERING') {
    // Guide to click stash
    const infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'font-size:12px;color:#7090b0;line-height:1.5;padding:8px 0';
    infoDiv.textContent = 'Click a glowing star in the STASH to create a new system.';
    actionBtns.appendChild(infoDiv);
    addCancelBtn(actionBtns);
  } else if (G.interaction === 'TRADING') {
    const ship = findShip(G.selectedShipId);
    const avail = ship ? COLORS.filter(col => col !== ship.color && G.bank[col][ship.size] > 0) : [];
    const infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'font-size:12px;color:#2266ff;line-height:1.6;padding:4px 0 8px';
    if (!ship || avail.length === 0) {
      infoDiv.style.color = '#ff8888';
      infoDiv.textContent = '⚠ No colors available to trade into at this size.';
    } else {
      infoDiv.innerHTML = `Trading your <span style="color:${COLOR_HEX[ship.color]}">${ship.color} ${SIZE_NAME[ship.size]}</span>.<br>Click a highlighted cell in the <b style="color:#ddeeff">Stash</b> to pick new color.`;
    }
    actionBtns.appendChild(infoDiv);
    addCancelBtn(actionBtns);
  } else if (G.interaction === 'ATTACKING') {
    const infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'font-size:12px;color:#ff8888;line-height:1.5';
    infoDiv.textContent = 'Click a highlighted enemy ship to capture it.';
    actionBtns.appendChild(infoDiv);
    addCancelBtn(actionBtns);
  } else if (G.interaction === 'BUILDING') {
    const sys = findSystemByShip(G.selectedShipId);
    const ownColors = sys ? [...new Set(sys.ships.filter(s => s.owner === G.currentPlayer).map(s => s.color))] : [];
    const buildable = ownColors.filter(col => [1,2,3].some(sz => G.bank[col][sz] > 0));
    const infoDiv = document.createElement('div');
    infoDiv.style.cssText = 'font-size:12px;color:#22dd77;line-height:1.6;padding:4px 0 8px';
    if (buildable.length === 0) {
      infoDiv.style.color = '#ff8888';
      infoDiv.textContent = '⚠ Bank empty for all your ship colors here.';
    } else {
      const colorList = buildable.map(col => {
        const sz = [1,2,3].find(s => G.bank[col][s] > 0);
        return `<span style="color:${COLOR_HEX[col]}">${SIZE_NAME[sz]} ${col}</span>`;
      }).join(', ');
      infoDiv.innerHTML = `Click a highlighted cell in the <b style="color:#ddeeff">Stash</b> to build:<br>${colorList}`;
    }
    actionBtns.appendChild(infoDiv);
    addCancelBtn(actionBtns);
  }
}
